http:
- address: 0.0.0.0
  hostnames:
  - "*"
  metadata:
    kind: Gateway
    name: gateway-1
    namespace: envoy-gateway
    sectionName: http
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      name: httproute/default/httproute-1/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-1/rule/0/backend/0
    hostname: gateway.envoyproxy.io
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: httproute-1
      namespace: default
    name: httproute/default/httproute-1/rule/0/match/0/gateway_envoyproxy_io
    pathMatch:
      distinct: false
      name: ""
      prefix: /one
    traffic:
      compression:
      - type: Gzip
        minContentLength: 100
        gzip:
          compressionLevel: 1
          compressionStrategy: RLE
          memoryLevel: 4
          windowBits: 12
          chunkSize: 4096
  - destination:
      name: httproute/default/httproute-2/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 8.8.8.8
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-2/rule/0/backend/0
    hostname: gateway.envoyproxy.io
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: httproute-2
      namespace: default
    name: httproute/default/httproute-2/rule/0/match/0/gateway_envoyproxy_io
    pathMatch:
      distinct: false
      name: ""
      prefix: /two
    traffic:
      compression:
      - type: Gzip
        minContentLength: 200
        gzip:
          compressionLevel: 9
          compressionStrategy: Fixed
          memoryLevel: 8
          windowBits: 15
          chunkSize: 8192
