              namespace: default
              sectionName: "8443"
            name: tlsroute/default/tlsroute-a/rule/-1/backend/0
            protocol: TCP
            weight: 1
        metadata:
          kind: TLSRoute
          name: tlsroute-a
          namespace: default
        name: tlsroute/default/tlsroute-a
        tls:
          inspector:
            snis:
            - a.example.com
      - authorization:
          defaultAction: Deny
          rules:
          - action: Allow
            name: allow-route-b
            principal:
              clientCIDRs:
              - cidr: 10.0.0.0/8
                distinct: false
                invert: false
