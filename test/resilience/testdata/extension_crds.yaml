apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: foofilters.ext-a.example.io
spec:
  group: ext-a.example.io
  names:
    kind: FooFilter
    plural: foofilters
    singular: foofilter
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                value:
                  type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: barfilters.ext-b.example.io
spec:
  group: ext-b.example.io
  names:
    kind: BarFilter
    plural: barfilters
    singular: barfilter
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                value:
                  type: string
---
# Grant envoy-gateway permission to list/watch the extension CRDs it declares
# under extensionManagers[].resources. Without this, controller-runtime's
# informers fail with "forbidden: cannot list resource ..." and the provider
# never finishes cache sync.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: envoy-gateway-resilience-ext-resources
rules:
  - apiGroups: ["ext-a.example.io"]
    resources: ["foofilters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ext-b.example.io"]
    resources: ["barfilters"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: envoy-gateway-resilience-ext-resources
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: envoy-gateway-resilience-ext-resources
subjects:
  - kind: ServiceAccount
    name: envoy-gateway
    namespace: envoy-gateway-system
