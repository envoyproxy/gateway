global:
  imageRegistry: "docker.io"

deployment:
  envoyGateway:
    image:
      repository: "envoyproxy/gateway-dev"
      tag: "latest"
    imagePullPolicy: Always

# maybe nuke this
ratelimit:
  image:
    registry: "private-hub"
    repository: "envoyproxy/ratelimit"
    tag: "master"
  imagePullPolicy: Always

config:
  envoyGateway:
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
    provider:
      type: Kubernetes
      kubernetes:
        leaderElection:
          enabled: false
        rateLimitDeployment:
          container:
            image: private-hub/envoyproxy/ratelimit:master
    logging:
      level:
        default: debug
