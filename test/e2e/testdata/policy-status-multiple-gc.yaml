apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internet-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: internet
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: private-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: private
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: multiple-gc-btp
  namespace: gateway-conformance-infra
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internet-gateway
    sectionName: http
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: private-gateway
    sectionName: http
  responseOverride:
  - match:
      statusCodes:
      - type: Value
        value: 418
    response:
      statusCode: 500
