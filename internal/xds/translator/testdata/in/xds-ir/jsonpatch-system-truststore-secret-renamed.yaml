envoyPatchPolicies:
- status:
    ancestors:
    - ancestorRef:
        group: "gateway.networking.k8s.io"
        kind: "Gateway"
        namespace: "envoy-gateway"
        name: "gateway-btls"
  name: "rename-to-system-ca-policy"
  namespace: "default"
  generation: 1
  jsonPatches:
  # Step 1: add a legitimate CA secret
  - type: "type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret"
    name: "other-secret"
    operation:
      op: "add"
      path: ""
      value:
        name: other-secret
        validation_context:
          trusted_ca:
            filename: "/etc/ssl/certs/ca-certificates.crt"
  # Step 2: attempt to rename it to the reserved name — must be rejected
  - type: "type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret"
    name: "other-secret"
    operation:
      op: "replace"
      path: "/name"
      value: "system_ca_certificates"
http:
- address: 0.0.0.0
  hostnames:
  - '*'
  name: envoy-gateway/gateway-btls/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      name: httproute/envoy-gateway/httproute-btls/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 10.244.0.11
          port: 8080
        protocol: HTTP
        tls:
          CACertificate:
            name: system_ca_certificates
          sni: example.com
          useSystemTrustStore: true
        weight: 1
        name: httproute/envoy-gateway/httproute-btls/rule/0/backend/0
    hostname: '*'
    name: httproute/envoy-gateway/httproute-btls/rule/0/match/0/*
    pathMatch:
      distinct: false
      exact: /exact
      name: ""
