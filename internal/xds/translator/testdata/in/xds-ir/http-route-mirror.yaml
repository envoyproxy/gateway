http:
- name: "first-listener"
  address: "::"
  port: 10080
  hostnames:
  - "*"
  path:
    mergeSlashes: true
    escapedSlashesAction: UnescapeAndRedirect
  routes:
  - name: "mirror-route"
    hostname: "*"
    destination:
      name: "route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          port: 50000
        name: "route-dest/backend/0"
    mirrors:
    - destination:
        name: "mirror-route-dest"
        settings:
        - endpoints:
          - host: "2.3.4.5"
          name: "mirror-route-dest/backend/0"
    - clusterHeader: "x-shadow-cluster"
      percentage: 25
      traceSampled: false
      disableShadowHostSuffixAppend: false
      addRequestHeaders:
      - name: "x-mirror-added"
        value:
        - "true"
        append: true
      - name: "x-mirror-set"
        value:
        - "shadow"
        append: false
      - name: "x-mirror-if-absent"
        value:
        - "fallback"
        addIfAbsent: true
      removeRequestHeaders:
      - "x-mirror-remove"
      removeRequestHeadersOnMatch:
      - distinct: false
        prefix: "x-shadow-"
      hostRewriteLiteral: "shadow.example.com"
