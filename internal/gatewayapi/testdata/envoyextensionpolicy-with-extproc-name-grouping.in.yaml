gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: default
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-1
  spec:
    hostnames:
    - www.foo.com
    parentRefs:
    - namespace: default
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: /foo
      backendRefs:
      - name: service-1
        port: 8080
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-2
  spec:
    hostnames:
    - www.bar.com
    parentRefs:
    - namespace: default
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: /bar
      backendRefs:
      - name: service-1
        port: 8080
services:
- apiVersion: v1
  kind: Service
  metadata:
    namespace: default
    name: grpc-backend-1
  spec:
    ports:
    - port: 9000
      name: grpc
      protocol: TCP
- apiVersion: v1
  kind: Service
  metadata:
    namespace: default
    name: grpc-backend-2
  spec:
    ports:
    - port: 9000
      name: grpc
      protocol: TCP
endpointSlices:
- apiVersion: discovery.k8s.io/v1
  kind: EndpointSlice
  metadata:
    name: endpointslice-grpc-backend-1
    namespace: default
    labels:
      kubernetes.io/service-name: grpc-backend-1
  addressType: IPv4
  ports:
  - name: grpc
    protocol: TCP
    port: 9000
  endpoints:
  - addresses:
    - 7.7.7.7
    conditions:
      ready: true
- apiVersion: discovery.k8s.io/v1
  kind: EndpointSlice
  metadata:
    name: endpointslice-grpc-backend-2
    namespace: default
    labels:
      kubernetes.io/service-name: grpc-backend-2
  addressType: IPv4
  ports:
  - name: grpc
    protocol: TCP
    port: 9000
  endpoints:
  - addresses:
    - 8.8.8.8
    conditions:
      ready: true
envoyExtensionPolicies:
# Two policies on different routes assign the same custom name "auth" to their ext-proc.
# Each route's filter instance has its own filter state, so %EG_EXT_FILTER_STATE(auth:...)%
# resolves correctly per-route. Both customNames are preserved.
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: default
    name: policy-for-httproute-1
  spec:
    targetRef:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-1
    extProc:
    - name: auth
      backendRefs:
      - name: grpc-backend-1
        port: 9000
# policy-for-httproute-2 uses the same custom name "auth" — this is valid because
# each route's ext-proc filter has its own filter state.
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: default
    name: policy-for-httproute-2
  spec:
    targetRef:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-2
    extProc:
    - name: auth
      backendRefs:
      - name: grpc-backend-2
        port: 9000
