gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      namespace: envoy-gateway
      name: gateway-1
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      namespace: default
      name: httproute-ws
    spec:
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
      rules:
        - matches:
            - path:
                value: "/ws"
          backendRefs:
            - group: gateway.envoyproxy.io
              kind: Backend
              name: backend-ws
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      namespace: default
      name: httproute-wss
    spec:
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
      rules:
        - matches:
            - path:
                value: "/wss"
          backendRefs:
            - group: gateway.envoyproxy.io
              kind: Backend
              name: backend-wss
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      namespace: default
      name: httproute-h2c
    spec:
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
      rules:
        - matches:
            - path:
                value: "/h2c"
          backendRefs:
            - group: gateway.envoyproxy.io
              kind: Backend
              name: backend-h2c
backends:
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-ws
      namespace: default
    spec:
      appProtocols:
        - gateway.envoyproxy.io/ws
      endpoints:
        - ip:
            address: 10.244.0.28
            port: 3000
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-wss
      namespace: default
    spec:
      appProtocols:
        - gateway.envoyproxy.io/wss
      endpoints:
        - fqdn:
            hostname: websocket.example.com
            port: 443
      tls:
        wellKnownCACertificates: System
        sni: websocket.example.com
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-h2c
      namespace: default
    spec:
      appProtocols:
        - gateway.envoyproxy.io/h2c
      endpoints:
        - fqdn:
            hostname: primary.foo.com
            port: 3000
