    accessLog:
      json:
      - path: /dev/stdout
    globalResources:
      proxyServiceCluster:
        metadata:
          kind: Service
          name: envoy-default-gateway-1-bfd08ef4
          namespace: envoy-gateway-system
          sectionName: "8080"
        name: default/gateway-1
        settings:
        - addressType: IP
          endpoints:
          - host: 7.6.5.4
            port: 8080
            zone: zone1
          metadata:
            kind: Service
            name: envoy-default-gateway-1-bfd08ef4
            namespace: envoy-gateway-system
            sectionName: "8080"
          name: default/gateway-1
          protocol: TCP
    readyListener:
      address: 0.0.0.0
      ipFamily: IPv4
      path: /ready
      port: 19003
    udp:
    - address: 0.0.0.0
      externalPort: 8162
      metadata:
        kind: Gateway
        name: gateway-1
        namespace: default
        sectionName: udp
      name: default/gateway-1/udp
      port: 8162
      route:
        destination:
          metadata:
            kind: UDPRoute
            name: udproute-1
            namespace: default
          name: udproute/default/udproute-1/rule/-1
          settings:
          - addressType: IP
            endpoints:
            - host: 7.7.7.7
              port: 8162
            metadata:
              kind: Service
              name: service-1
              namespace: default
              sectionName: "8162"
            name: udproute/default/udproute-1/rule/-1/backend/0
