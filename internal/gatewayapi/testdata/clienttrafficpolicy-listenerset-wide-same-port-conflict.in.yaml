clientTrafficPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: ClientTrafficPolicy
  metadata:
    namespace: envoy-gateway
    name: ctp-ls-wide-conflict-with-gateway
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners-a
    tcpKeepalive:
      probes: 5
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: ClientTrafficPolicy
  metadata:
    namespace: envoy-gateway
    name: ctp-ls-wide-conflict-with-other-ls
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners-b
    tcpKeepalive:
      probes: 5
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: composite-gateway
  spec:
    gatewayClassName: envoy-gateway-class
    allowedListeners:
      namespaces:
        from: Same
    listeners:
    - name: core-http
      hostname: gw.example.com
      protocol: HTTP
      port: 8081
      allowedRoutes:
        namespaces:
          from: Same
listenerSets:
- apiVersion: gateway.networking.k8s.io/v1
  kind: ListenerSet
  metadata:
    namespace: envoy-gateway
    name: ext-listeners-a
  spec:
    parentRef:
      name: composite-gateway
    listeners:
    - name: ext-http-a
      hostname: a.example.com
      protocol: HTTP
      port: 8081
      allowedRoutes:
        namespaces:
          from: Same
- apiVersion: gateway.networking.k8s.io/v1
  kind: ListenerSet
  metadata:
    namespace: envoy-gateway
    name: ext-listeners-b
  spec:
    parentRef:
      name: composite-gateway
    listeners:
    - name: ext-http-b
      hostname: b.example.com
      protocol: HTTP
      port: 8081
      allowedRoutes:
        namespaces:
          from: Same
