    accessLog:
      json:
      - path: /dev/stdout
    globalResources:
      proxyServiceCluster:
        metadata:
          kind: Service
          name: envoy-envoy-gateway-gateway-tls-e5408cf3
          namespace: envoy-gateway-system
          sectionName: "8080"
        name: envoy-gateway/gateway-tls
        settings:
        - addressType: IP
          endpoints:
          - host: 7.6.5.4
            port: 8080
            zone: zone1
          metadata:
            kind: Service
            name: envoy-envoy-gateway-gateway-tls-e5408cf3
            namespace: envoy-gateway-system
            sectionName: "8080"
          name: envoy-gateway/gateway-tls
          protocol: TCP
    readyListener:
      address: 0.0.0.0
      ipFamily: IPv4
      path: /ready
      port: 19003
    tcp:
    - address: 0.0.0.0
      externalPort: 8443
      metadata:
        kind: Gateway
