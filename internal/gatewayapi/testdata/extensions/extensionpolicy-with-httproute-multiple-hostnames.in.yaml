gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-1
  spec:
    hostnames:
    - foo.example.com
    - bar.example.com
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: "/foo"
      backendRefs:
      - name: service-1
        port: 8080
extensionServerPolicies:
# A single policy targeting one HTTPRoute that is served under two hostnames.
# A whole-route policy (no sectionName) applies to every route generated from
# the HTTPRoute, so each per-hostname route (foo.example.com and
# bar.example.com) receives the policy via the PostRouteModify hook.
- apiVersion: foo.example.io/v1alpha1
  kind: Bar
  metadata:
    name: policy-1
    namespace: default
  spec:
    targetRef:
      kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: httproute-1
    data: "attached to an httproute with two hostnames"
