# Changes that are expected to cause an incompatibility with previous versions, such as deletions or modifications to existing APIs.
breaking changes: |
  Moved the Gateway API safe-upgrades ValidatingAdmissionPolicy resources out of the CRD bundle and into the gateway-helm chart templates so tools such as Flux no longer treat them as CRDs. During upgrades, two upgrade cases require action: (1) if you install Gateway API CRDs separately (e.g. with the gateway-crds-helm chart and `helm install --skip-crds`), the safe-upgrades ValidatingAdmissionPolicy and its binding are now rendered by the gateway-helm chart, so add Helm ownership metadata (the `meta.helm.sh/release-name`, `meta.helm.sh/release-namespace` annotations and the `app.kubernetes.io/managed-by=Helm` label) to the `ValidatingAdmissionPolicy/safe-upgrades.gateway.networking.k8s.io` and `ValidatingAdmissionPolicyBinding/safe-upgrades.gateway.networking.k8s.io` resources before upgrading so Helm can manage them (see https://gateway.envoyproxy.io/v1.8/install/install-helm/#installing-crds-separately); (2) if Gateway API CRDs and safe upgrade policy resources are managed by your cloud provider (or any other mechanism outside this chart), note that `--skip-crds` does not skip chart-templated resources, so disable rendering of the safe-upgrades ValidatingAdmissionPolicy by setting `crds.gatewayAPI.safeUpgradePolicy.enabled=false` (see https://gateway.envoyproxy.io/v1.8/install/install-helm/#clusters-with-compatible-provider-managed-gateway-api-crds).
  Lua EnvoyExtensionPolicies are now disabled by default. Use the new `enableLua` field in `extensionApis` to explicitly enable them. The `disableLua` field is deprecated and will be removed in a future release.

# Updates addressing vulnerabilities, security flaws, or compliance requirements.
security updates: |
  Fixed xDS server authentication bypass in GatewayNamespaceMode, adding Unary Interceptor and validating SotW requests.

# New features or capabilities added in this release.
new features: |
  Added support for configuring optional health check configuration.
  Added support for shadow mode in local rate limiting.
  Added support for MergeType in SecurityPolicy to enable route-level policies to merge with parent Gateway/Listener policies, similar to BackendTrafficPolicy.
  Added `egctl config envoy-gateway` commands to retrieve Envoy Gateway admin config dumps.
  The DirectResponse body in HTTPFilter now supports Envoy command operators for dynamic content. See https://www.envoyproxy.io/docs/envoy/latest/configuration/observability/access_log/usage#command-operators for more details.
  Added HTTP/2 connection keepalive support to ClientTrafficPolicy and BackendTrafficPolicy.
  Implement RoutingType field for BackendTrafficPolicy
  Support for configuring weights for locality zones.
  Added support for settings of gRPC web in ClientTrafficPolicy.
  Added support for Envoy Dynamic Modules.
  Added support for weight in BackendRef API to enable traffic splitting for non-x-route resources.
  Added support for removing headers based on matching criteria (Exact, Prefix, Suffix, RegularExpression) in ClientTrafficPolicy EarlyRequestHeaders and LateResponseHeaders.
  Added support for priorityClassName in KubernetesPodSpec for Envoy Proxy pods.
  Added support for Global rate limit shadow mode.
  Added support for specifying both text (body) and attributes in access log format by making the type field optional.
  Set warning status condition for deprecated fields in xPolicy CRDs.
  Added support for URLRewrite filter on individual backendRefs.
  Added support for custom headers on OTLP exports (metrics, tracing, access logs).
  Added support for custom TLS configuration when pulling WASM code via HTTP or OCI in EnvoyExtensionPolicy.
  Added support for settings of gRPC stats in EnvoyProxy.
  Added the PostEndpointsModify extension hook, allowing extensions to modify EDS ClusterLoadAssignments generated by Envoy Gateway before they are sent to Envoy.
  Added support for stream idle timeout in BackendTrafficPolicy.
  Added `namespaceOverride` support to gateway-helm chart
  Added support for configuring statusOnError in ExtAuth settings
  Added support for GeoIP-based authorization on HTTPRoute and GRPCRoute via `SecurityPolicy.spec.authorization.rules[*].principal.clientIPGeoLocations`, backed by shared GeoIP provider settings in `EnvoyProxy.spec.geoIP`.
  Added support for retry budget in BackendTrafficPolicy.
  Added support for BackendUtilization load balancing policy in BackendTrafficPolicy.
  Added support for upstrean access log.
  Added support for invert match in CIDR match RateLimit API.
  Added support for ignoring HTTP/1.1 Upgrade requests in ClientTrafficPolicy via `http1.ignoredUpgradeTypes`.
  Added support for OpenTelemetry sampler configuration for tracing.
  Added support for multiple ExtensionManagers with sequential chaining via a new `extensionManagers` field in `EnvoyGateway` configuration.
  Added support for default EnvoyProxy settings on EnvoyGatewaySpec that can be overridden by GatewayClass or Gateway-level EnvoyProxy configurations. A new MergeType field allows choosing between Replace (default), StrategicMerge, or JSONMerge strategies for combining configurations.
  Added support for sending Envoy Gateway route metadata to external authorization backends via `SecurityPolicy.spec.extAuth.includeRouteMetadata`.
  Added `source` field to `responseOverride` rules in BackendTrafficPolicy, allowing rules to target only Envoy-generated responses (`Local`), only upstream responses (`Backend`), or both (`All`, the default). This enables overriding envoy responses (e.g. auth/rate-limit failures) without affecting legitimate upstream responses with the same status code.
  Added support for path override in ExtAuth HTTP service.
  Added support for bandwidth limit.
  Added support for defining Envoy Proxy image, pullPolicy, and pullSecrets via the helm chart.  Note that to merge these helm-configured values with EnvoyProxy resources, the EnvoyProxy must include `mergeType: StrategicMerge` or `mergeType: JSONMerge`.
  Added support for `name` field on ext-proc entries in `EnvoyExtensionPolicy`, enabling the `%EG_EXT_PROC_FILTER_STATE(name:attribute)%` access log operator that resolves ext-proc filter state by a user-defined name at xDS translation time, without requiring knowledge of EG's internal filter naming conventions. The operator applies to downstream (listener/route) access logs only; upstream access log support is deferred pending upstream ext-proc filter support.
  Added support for `statPrefix` field on ext-proc entries in `EnvoyExtensionPolicy`, allowing users to control the Envoy stat prefix for ext-proc filter instances to get readable metric names and intentionally aggregate or isolate stats across deployments.
  Added support for authorization path match.
  Added a `requestBody` field to the HTTP active health checker in `BackendTrafficPolicy`, allowing a request body payload to be sent during HTTP health checking. The field requires the health check `method` to be `POST` or `PUT`.

bug fixes: |
  Fixed the xDS server in GatewayNamespaceMode serving a stale certificate after cert-manager rotation by re-reading the cert from disk on every TLS handshake.
  Fixed controller panic when processing backend tls settings.
  Fixed BackendTLSPolicy selection to prefer section name over wildcard match on the same backend.
  Fixed missing deprecated field warning in ClientTrafficPolicy and SecurityPolicy.
  Fixed ClientTrafficPolicy TLS cipher validation rejecting supported IANA/RFC cipher suite names.
  Fixed Kubernetes provider namespace-scoped watches to always include the controller namespace so Envoy Gateway can read its own infrastructure resources.
  Fixed TLS secrets with non-canonical PEM formatting (e.g. unusual line endings) being passed verbatim to Envoy, which could cause BoringSSL errors such as `BAD_END_LINE`. Cert and key PEM data is now re-encoded to a canonical form before being delivered as xDS resources.
  Fixed `MaxStreamDuration` not being set on `CommonHttpProtocolOptions` for non-route cluster.
  Fixed `egctl x status all`/`xroute`/`xpolicy` failing when a Gateway API CRD (e.g. TCPRoute) is not installed in the cluster; missing CRDs are now skipped silently, or reported on stderr with `-v`.
  Fixed Kubernetes Service and ServiceImport `appProtocol` values `kubernetes.io/ws` and `kubernetes.io/wss` to force HTTP/1.1 upstream connections instead of negotiating HTTP/2, avoiding compatibility issues with WebSocket backends that do not support RFC 8441 extended CONNECT.
