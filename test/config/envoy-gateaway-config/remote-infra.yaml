apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-gateway-config
  namespace: envoy-gateway-system
data:
  envoy-gateway.yaml: |
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyGateway
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
    provider:
      type: Custom
      custom:
        resource:
          type: Kubernetes
        infrastructure:
          type: Remote
          remote:
            service:
              # Unix domain socket shared with the remote-infra recording
              # sidecar (see test/e2e/remote_infra/sidecar-patch.yaml).
              unix:
                path: /var/run/remote-infra/server.sock
