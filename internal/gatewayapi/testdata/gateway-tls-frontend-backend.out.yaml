        status: "False"
        type: Programmed
      - lastTransitionTime: null
        message: Listener has invalid CA certificate for frontend TLS validation.
        reason: NoValidCACertificate
        status: "False"
        type: Accepted
      name: https
      supportedKinds:
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
      - group: gateway.networking.k8s.io
        kind: GRPCRoute
    - attachedRoutes: 1
