envoyProxyForGatewayClass:
  apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyProxy
  metadata:
    namespace: envoy-gateway-system
    name: test
  spec:
    mergeGateways: true
# gateway-1 is older (2024-01-01) and processed first.
# gateway-2 is newer (2024-06-01) and processed second — its listener shares the HCM.
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: default
    name: gateway-1
    creationTimestamp: "2024-01-01T00:00:00Z"
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http
      hostname: www.foo.com
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: default
    name: gateway-2
    creationTimestamp: "2024-06-01T00:00:00Z"
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http
      hostname: www.bar.com
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-1
  spec:
    hostnames:
    - www.foo.com
    parentRefs:
    - namespace: default
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: /foo
      backendRefs:
      - name: service-1
        port: 8080
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-2
  spec:
    hostnames:
    - www.bar.com
    parentRefs:
    - namespace: default
      name: gateway-2
      sectionName: http
    rules:
    - matches:
      - path:
          value: /bar
      backendRefs:
      - name: service-1
        port: 8080
services:
- apiVersion: v1
  kind: Service
  metadata:
    namespace: default
    name: grpc-backend-1
  spec:
    ports:
    - port: 9000
      name: grpc
      protocol: TCP
- apiVersion: v1
  kind: Service
  metadata:
    namespace: default
    name: grpc-backend-2
  spec:
    ports:
    - port: 9000
      name: grpc
      protocol: TCP
endpointSlices:
- apiVersion: discovery.k8s.io/v1
  kind: EndpointSlice
  metadata:
    name: endpointslice-grpc-backend-1
    namespace: default
    labels:
      kubernetes.io/service-name: grpc-backend-1
  addressType: IPv4
  ports:
  - name: grpc
    protocol: TCP
    port: 9000
  endpoints:
  - addresses:
    - 7.7.7.7
    conditions:
      ready: true
- apiVersion: discovery.k8s.io/v1
  kind: EndpointSlice
  metadata:
    name: endpointslice-grpc-backend-2
    namespace: default
    labels:
      kubernetes.io/service-name: grpc-backend-2
  addressType: IPv4
  ports:
  - name: grpc
    protocol: TCP
    port: 9000
  endpoints:
  - addresses:
    - 8.8.8.8
    conditions:
      ready: true
envoyExtensionPolicies:
# policy-for-httproute-2 is OLDER (2024-02-01) than policy-for-httproute-1 (2024-03-01),
# but it targets gateway-2 which is the NEWER gateway.
# Gateway ordering takes priority over EEP ordering: gateway-1 is processed first,
# so its EEP's ext-proc (grpc-backend-1) wins for the "auth" custom name.
# No PolicyConditionOverridden warning is issued — cross-IR-listener collisions
# under MergeGateways non-TLS are not detected at IR build time.
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: default
    name: policy-for-httproute-2
    creationTimestamp: "2024-02-01T00:00:00Z"
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-2
    extProc:
    - name: auth
      backendRefs:
      - name: grpc-backend-2
        port: 9000
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: default
    name: policy-for-httproute-1
    creationTimestamp: "2024-03-01T00:00:00Z"
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-1
    extProc:
    - name: auth
      backendRefs:
      - name: grpc-backend-1
        port: 9000
