gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      namespace: envoy-gateway
      name: gateway-1
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
grpcRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: GRPCRoute
    metadata:
      namespace: default
      name: mirror-direct-response
    spec:
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
          sectionName: http
      rules:
        - backendRefs:
            - name: service-1
              port: 8080
          filters:
            - type: RequestMirror
              requestMirror:
                backendRef:
                  kind: Service
                  name: service-1
                  port: 8080
            - type: ExtensionRef
              extensionRef:
                group: gateway.envoyproxy.io
                kind: HTTPRouteFilter
                name: mirror-direct-response
        - backendRefs:
            - name: service-2
              port: 8080
httpFilters:
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: HTTPRouteFilter
    metadata:
      name: mirror-direct-response
      namespace: default
    spec:
      directResponse:
        statusCode: 404
        contentType: text/plain
        body:
          type: Inline
          inline: "blocked"
