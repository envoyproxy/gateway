          controllerName: gateway.envoyproxy.io/gatewayclass-controller
infraIR:
  envoy-gateway/gateway-1:
    proxy:
      listeners:
        - address: null
          name: envoy-gateway/gateway-1/http
          ports:
            - containerPort: 10080
              name: http-80
              protocol: HTTP
              servicePort: 80
      metadata:
        labels:
          gateway.envoyproxy.io/owning-gateway-name: gateway-1
          gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway
      name: envoy-gateway/gateway-1
  envoy-gateway/gateway-2:
    proxy:
      listeners:
        - address: null
          name: envoy-gateway/gateway-2/http
          ports:
            - containerPort: 8080
              name: http-8080
              protocol: HTTP
              servicePort: 8080
      metadata:
        labels:
          gateway.envoyproxy.io/owning-gateway-name: gateway-2
          gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway
      name: envoy-gateway/gateway-2
xdsIR:
  envoy-gateway/gateway-1:
    accessLog:
      json:
        - path: /dev/stdout
    http:
      - address: 0.0.0.0
        hostnames:
          - "*"
        metadata:
          kind: Gateway
          name: gateway-1
          namespace: envoy-gateway
          sectionName: http
        name: envoy-gateway/gateway-1/http
        path:
          escapedSlashesAction: UnescapeAndRedirect
          mergeSlashes: true
        port: 10080
        routes:
          - destination:
              name: httproute/default/httproute-1/rule/0
              settings:
                - addressType: IP
                  endpoints:
                    - host: 7.7.7.7
                      port: 8080
                  name: httproute/default/httproute-1/rule/0/backend/0
                  protocol: HTTP
                  weight: 1
            hostname: gateway.envoyproxy.io
            metadata:
              kind: HTTPRoute
              name: httproute-1
              namespace: default
            name: httproute/default/httproute-1/rule/0/match/0/gateway_envoyproxy_io
            pathMatch:
              prefix: /foo
            traffic:
              name: envoy-gateway/policy-for-gateway
              requestBuffer:
                limit: 4Mi
                targetGateway: true
    readyListener:
      address: 0.0.0.0
      ipFamily: IPv4
      path: /ready
      port: 19003
  envoy-gateway/gateway-2:
    accessLog:
      json:
        - path: /dev/stdout
    http:
      - address: 0.0.0.0
        hostnames:
          - "*"
        metadata:
          kind: Gateway
          name: gateway-2
          namespace: envoy-gateway
          sectionName: http
        name: envoy-gateway/gateway-2/http
        path:
          escapedSlashesAction: UnescapeAndRedirect
          mergeSlashes: true
        port: 8080
        routes:
          - destination:
              name: httproute/default/httproute-2/rule/0
              settings:
                - addressType: IP
                  endpoints:
                    - host: 7.7.7.7
                      port: 8080
                  name: httproute/default/httproute-2/rule/0/backend/0
                  protocol: HTTP
                  weight: 1
            hostname: gateway.envoyproxy.io
            metadata:
              kind: HTTPRoute
              name: httproute-2
              namespace: default
            name: httproute/default/httproute-2/rule/0/match/0/gateway_envoyproxy_io
            pathMatch:
              prefix: /foo
            traffic:
              name: default/policy-for-route
              requestBuffer:
                limit: 4Mi
                targetGateway: false
    readyListener:
      address: 0.0.0.0
      ipFamily: IPv4
      path: /ready
      port: 19003
