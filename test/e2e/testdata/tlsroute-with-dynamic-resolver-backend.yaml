apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: tlsroute-with-dynamic-resolver-backend
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
    sectionName: tls
  hostnames:
  - "tls-dfp-backend.gateway-conformance-infra.svc.cluster.local"
  rules:
  - backendRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: backend-dynamic-resolver
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: backend-dynamic-resolver
  namespace: gateway-conformance-infra
spec:
  type: DynamicResolver
---
# Self-signed certificate valid for the backend in-cluster FQDN. As this is a TLS passthrough route,
# the client validates the backend certificate directly, so the certificate SAN must match the SNI
# used to route (and to dynamically resolve the upstream).
# openssl req -x509 -sha256 -nodes -days 36500 -newkey rsa:2048 \
#   -subj '/O=example organization/CN=tls-dfp-backend' \
#   -addext 'subjectAltName=DNS:tls-dfp-backend,DNS:tls-dfp-backend.gateway-conformance-infra,DNS:tls-dfp-backend.gateway-conformance-infra.svc.cluster.local' \
#   -keyout tls.key -out tls.crt
apiVersion: v1
kind: Secret
metadata:
  name: tls-dfp-backend-cert
  namespace: gateway-conformance-infra
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: v1
kind: Service
metadata:
  name: tls-dfp-backend
  namespace: gateway-conformance-infra
spec:
  selector:
    app: tls-dfp-backend
  ports:
  - name: https
    protocol: TCP
    port: 443
    targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tls-dfp-backend
  namespace: gateway-conformance-infra
  labels:
    app: tls-dfp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tls-dfp-backend
  template:
    metadata:
      labels:
        app: tls-dfp-backend
    spec:
      containers:
      - name: tls-backend
        image: registry.k8s.io/gateway-api/echo-basic:v1.5.1
        volumeMounts:
        - name: secret-volume
          mountPath: /etc/secret-volume
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SERVICE_NAME
          value: tls-dfp-backend
        - name: TLS_SERVER_CERT
          value: /etc/secret-volume/crt
        - name: TLS_SERVER_PRIVKEY
          value: /etc/secret-volume/key
        resources:
          requests:
            cpu: 10m
      volumes:
      - name: secret-volume
        secret:
          secretName: tls-dfp-backend-cert
          items:
          - key: tls.crt
            path: crt
          - key: tls.key
            path: key
