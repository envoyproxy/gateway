gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      namespace: envoy-gateway
      name: gateway-1
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        # This listener has an invalid certificate reference (secret does not exist)
        # It should have ResolvedRefs=False with InvalidCertificateRef
        # and should be skipped during conflict resolution
        - name: invalid-https
          protocol: HTTPS
          port: 443
          hostname: "*.example.com"
          allowedRoutes:
            namespaces:
              from: All
          tls:
            mode: Terminate
            certificateRefs:
              - name: non-existent-secret
        # This listener has valid configuration and should be accepted
        # even though it's on the same port/hostname as the invalid listener
        - name: valid-https
          protocol: HTTPS
          port: 443
          hostname: "*.example.com"
          allowedRoutes:
            namespaces:
              from: All
          tls:
            mode: Terminate
            certificateRefs:
              - name: tls-secret-1
secrets:
  - apiVersion: v1
    kind: Secret
    metadata:
      namespace: envoy-gateway
      name: tls-secret-1
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      namespace: default
      name: httproute-1
    spec:
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
          sectionName: valid-https
      rules:
        - matches:
            - path:
                value: "/"
          backendRefs:
            - name: service-1
              port: 8080
