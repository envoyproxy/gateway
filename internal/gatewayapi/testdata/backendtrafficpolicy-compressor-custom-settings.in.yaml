gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      namespace: envoy-gateway
      name: gateway-1
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      namespace: default
      name: httproute-1
    spec:
      hostnames:
        - gateway.envoyproxy.io
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
          sectionName: http
      rules:
        - matches:
            - path:
                value: "/"
          backendRefs:
            - name: service-1
              port: 8080
backendTrafficPolicies:
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: BackendTrafficPolicy
    metadata:
      namespace: default
      name: policy-for-route
    spec:
      targetRef:
        group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: httproute-1
      compressor:
        - type: Brotli
          brotli:
            quality: 11
            encoderMode: Text
            windowBits: 24
            inputBlockBits: 16
            chunkSize: 8192
            disableLiteralContextModeling: true
        - type: Gzip
          gzip:
            compressionLevel: 9
            compressionStrategy: RLE
            memoryLevel: 8
            windowBits: 15
            chunkSize: 8192
          minContentLength: 64
        - type: Zstd
          zstd:
            compressionLevel: 22
            enableChecksum: true
            strategy: BTUltra2
            chunkSize: 65536
