apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: listener-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  allowedListeners:
    namespaces:
      from: Same
  listeners:
  - name: core
    port: 18080
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
# ./certs/client-mtls-trustbundle.sh
#
# kubectl create secret generic example-com-tls -n gateway-conformance-infra --from-file=ca.crt=example.com.crt --from-file=tls.crt=www.example.com.crt --from-file=tls.key=www.example.com.key --dry-run=client -o yaml > example-com-tls.yaml
apiVersion: v1
kind: Secret
metadata:
  name: listener-https-certificate
  namespace: gateway-conformance-infra
type: kubernetes.io/tls
data:
  ca.crt: 
  tls.crt: 
  tls.key: 

---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: listener-set-http
  namespace: gateway-conformance-infra
spec:
  parentRef:
    name: listener-gateway
    namespace: gateway-conformance-infra
  listeners:
  - name: extra-http
    port: 18081
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
  - name: extra-https
    port: 18443
    protocol: HTTPS
    hostname: www.example.com
    tls:
      mode: Terminate
      certificateRefs:
      - name: listener-https-certificate
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: listener-set-grpc
  namespace: gateway-conformance-infra
spec:
  parentRef:
    name: listener-gateway
    namespace: gateway-conformance-infra
  listeners:
  - name: extra-grpc
    port: 18082
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
