- address:
    socketAddress:
      address: 0.0.0.0
      portValue: 10080
  defaultFilterChain:
    filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        commonHttpProtocolOptions:
          headersWithUnderscoresAction: REJECT_REQUEST
        http2ProtocolOptions:
          initialConnectionWindowSize: 1048576
          initialStreamWindowSize: 65536
          maxConcurrentStreams: 100
        httpFilters:
        - name: envoy.filters.http.jwt_authn
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
            providers:
              jwt/provider/foobar/14d5b09b29e54e968c31c653f7cbc235a31a54c493a34c478f321f396942cbe3:
                audiences:
                - foo.bar.com
                claimToHeaders:
                - claimName: claim
                  headerName: claim-header
                forward: true
                issuer: https://foo.bar.com
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: foobar
                remoteJwks:
                  asyncFetch:
                    failedRefetchDuration: 30s
                  cacheDuration: 300s
                  httpUri:
                    cluster: securitypolicy/default/policy-for-route/jwt/0
                    timeout: 5s
                    uri: https://foo.bar.com/jwt/public-key/jwks.json
                  retryPolicy:
                    numRetries: 3
                    retryBackOff:
                      baseInterval: 1s
                      maxInterval: 5s
                    retryOn: 5xx,gateway-error,reset
            requirementMap:
              jwt/requirement/b5609eb5c2b748e8eb4d3a072628bca7a7645001802d5e5fed11260bdddc3932:
                providerName: jwt/provider/foobar/14d5b09b29e54e968c31c653f7cbc235a31a54c493a34c478f321f396942cbe3
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            suppressEnvoyHeaders: true
        mergeSlashes: true
        normalizePath: true
        pathWithEscapedSlashesAction: UNESCAPE_AND_REDIRECT
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: default/gateway-1/http
        serverHeaderTransformation: PASS_THROUGH
        statPrefix: http-10080
        useRemoteAddress: true
    name: default/gateway-1/http
  maxConnectionsToAcceptPerSocketEvent: 1
  name: default/gateway-1/http
  perConnectionBufferLimitBytes: 32768
