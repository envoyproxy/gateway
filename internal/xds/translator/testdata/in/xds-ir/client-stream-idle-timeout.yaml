http:
  - name: "first-listener"
    address: "::"
    port: 10080
    hostnames:
      - "*"
    path:
      mergeSlashes: true
      escapedSlashesAction: UnescapeAndRedirect
    routes:
      - name: "first-route"
        hostname: "*"
        destination:
          name: "first-route-dest"
          backendClusterRefs:
            - name: "first-route-dest"
    timeout:
      http:
        requestReceivedTimeout: "5s"
        idleTimeout: "10s"
        streamIdleTimeout: "1h"
tcp:
  - name: "second-listener"
    address: "::"
    port: 10081
    routes:
      - name: "second-route"
        destination:
          name: "second-route-dest"
          backendClusterRefs:
            - name: "second-route-dest"
    timeout:
      tcp:
        idleTimeout: "1200s"
backends:
  - name: "first-route-dest"
    settings:
      - endpoints:
          - host: "1.2.3.4"
            port: 50000
        name: "first-route-dest/backend/0"
  - name: "second-route-dest"
    settings:
      - endpoints:
          - host: "1.2.3.4"
            port: 50000
        name: "second-route-dest/backend/0"
