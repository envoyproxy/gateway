http:
- address: 0.0.0.0
  hostnames:
  - '*'
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      name: httproute/default/httproute-1/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        name: httproute/default/httproute-1/rule/0/backend/0
        protocol: HTTP
        weight: 1
    hostname: www.example.com
    isHTTP2: false
    name: httproute/default/httproute-1/rule/0/match/0/www_example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /foo
    security:
      authorization:
        defaultAction: Deny
        rules:
        - action: Allow
          name: allow-public-prefix
          operation:
            path:
              type: PathPrefix
              value: /public
          principal:
            headers:
            - name: x-user-id
              values:
              - john
              - alice
        - action: Allow
          name: allow-admin-exact
          operation:
            path:
              invert: true
              type: Exact
              value: /admin
          principal:
            headers:
            - name: x-role
              values:
              - admin
        - action: Deny
          name: deny-non-private
          operation:
            path:
              type: RegularExpression
              value: ^/private/.*
          principal:
            headers:
            - name: x-team
              values:
              - red
