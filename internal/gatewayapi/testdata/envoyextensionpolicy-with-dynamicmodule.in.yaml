envoyProxiesForGateways:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyProxy
  metadata:
    namespace: envoy-gateway
    name: proxy-config
  spec:
    dynamicModules:
    - name: my-auth-module
      source:
        type: Local
        local:
          path: /usr/lib/envoy/modules/my_auth.so
    - name: remote-auth-module
      source:
        type: Remote
        remote:
          url: https://modules.example.com/libremote_auth.so
          sha256: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
    - name: ai-gateway-filter
      source:
        local:
          path: /usr/lib/envoy/modules/ai_gateway.so
      doNotClose: true
      loadGlobally: true
    - name: path-loaded-module
      source:
        type: Local
        local:
          path: /opt/modules/my_module.so
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    infrastructure:
      parametersRef:
        group: gateway.envoyproxy.io
        kind: EnvoyProxy
        name: proxy-config
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-1
  spec:
    hostnames:
    - www.example.com
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: "/foo"
      backendRefs:
      - name: service-1
        port: 8080
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-2
  spec:
    hostnames:
    - www.example.com
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: "/bar"
      backendRefs:
      - name: service-1
        port: 8080
envoyextensionpolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: envoy-gateway
    name: policy-for-gateway  # This policy should attach to httproute-2
  spec:
    targetRef:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-1
    dynamicModule:
    - name: my-auth-module
      filterName: auth-check
      config:
        authEndpoint: https://auth.example.com
    - name: remote-auth-module
      filterName: remote-auth-check
      config:
        authEndpoint: https://remote-auth.example.com
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: default
    name: policy-for-http-route  # This policy should attach to httproute-1
  spec:
    targetRef:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-1
    dynamicModule:
    - name: ai-gateway-filter
      filterName: token-ratelimit
      config:
        maxTokensPerMinute: 10000
    - name: path-loaded-module
      filterName: path-filter
