gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: gateway-1
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
backends:
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: spire-uds
      namespace: envoy-gateway-system
    spec:
      endpoints:
        - unix:
            path: /var/run/secrets/workload-spiffe-uds/socket
      type: Endpoints
backendTLSPolicies:
  # Test case 1: Multiple SDS reference secrets (should be rejected)
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: policy-multiple-sds
      namespace: default
    spec:
      targetRefs:
        - kind: Service
          name: service-1
      validation:
        caCertificateRefs:
          - name: sds-ref-1
            kind: Secret
          - name: sds-ref-2
            kind: Secret
        hostname: example.com
  # Test case 2: Mixing SDS with ConfigMap (should be rejected)
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: policy-sds-with-configmap
      namespace: default
    spec:
      targetRefs:
        - kind: Service
          name: service-2
      validation:
        caCertificateRefs:
          - name: sds-ref-1
            kind: Secret
          - name: ca-configmap
            kind: ConfigMap
        hostname: example.com
  # Test case 3: Mixing SDS with regular Secret (should be rejected)
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: policy-sds-with-secret
      namespace: default
    spec:
      targetRefs:
        - kind: Service
          name: service-3
      validation:
        caCertificateRefs:
          - name: sds-ref-1
            kind: Secret
          - name: regular-ca-secret
            kind: Secret
        hostname: example.com
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: httproute-1
      namespace: default
    spec:
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
          sectionName: http
      rules:
        - matches:
            - path:
                type: Exact
                value: "/service1"
          backendRefs:
            - name: service-1
              port: 8080
        - matches:
            - path:
                type: Exact
                value: "/service2"
          backendRefs:
            - name: service-2
              port: 8080
        - matches:
            - path:
                type: Exact
                value: "/service3"
          backendRefs:
            - name: service-3
              port: 8080
services:
  - apiVersion: v1
    kind: Service
    metadata:
      name: service-1
      namespace: default
    spec:
      clusterIP: 10.11.12.13
      ports:
        - port: 8080
          name: http
          protocol: TCP
          targetPort: 8080
  - apiVersion: v1
    kind: Service
    metadata:
      name: service-2
      namespace: default
    spec:
      clusterIP: 10.11.12.14
      ports:
        - port: 8080
          name: http
          protocol: TCP
          targetPort: 8080
  - apiVersion: v1
    kind: Service
    metadata:
      name: service-3
      namespace: default
    spec:
      clusterIP: 10.11.12.15
      ports:
        - port: 8080
          name: http
          protocol: TCP
          targetPort: 8080
endpointSlices:
  - apiVersion: discovery.k8s.io/v1
    kind: EndpointSlice
    metadata:
      name: endpointslice-service-1
      namespace: default
      labels:
        kubernetes.io/service-name: service-1
    addressType: IPv4
    ports:
      - name: http
        protocol: TCP
        port: 8080
    endpoints:
      - addresses:
          - "10.244.0.11"
        conditions:
          ready: true
  - apiVersion: discovery.k8s.io/v1
    kind: EndpointSlice
    metadata:
      name: endpointslice-service-2
      namespace: default
      labels:
        kubernetes.io/service-name: service-2
    addressType: IPv4
    ports:
      - name: http
        protocol: TCP
        port: 8080
    endpoints:
      - addresses:
          - "10.244.0.12"
        conditions:
          ready: true
  - apiVersion: discovery.k8s.io/v1
    kind: EndpointSlice
    metadata:
      name: endpointslice-service-3
      namespace: default
      labels:
        kubernetes.io/service-name: service-3
    addressType: IPv4
    ports:
      - name: http
        protocol: TCP
        port: 8080
    endpoints:
      - addresses:
          - "10.244.0.13"
        conditions:
          ready: true
secrets:
  # SDS reference secrets
  - apiVersion: v1
    kind: Secret
    metadata:
      name: sds-ref-1
      namespace: default
    type: gateway.envoyproxy.io/sds
    data:
      url: L3Zhci9ydW4vc2VjcmV0cy93b3JrbG9hZC1zcGlmZmUtdWRzL3NvY2tldA==  # /var/run/secrets/workload-spiffe-uds/socket
      secretName: Uk9PVENB  # ROOTCA
  - apiVersion: v1
    kind: Secret
    metadata:
      name: sds-ref-2
      namespace: default
    type: gateway.envoyproxy.io/sds
    data:
      url: L3Zhci9ydW4vc2VjcmV0cy93b3JrbG9hZC1zcGlmZmUtdWRzL3NvY2tldA==  # /var/run/secrets/workload-spiffe-uds/socket
      secretName: Uk9PVENBMg==  # ROOTCA2
  # Regular secret with CA certificate
  - apiVersion: v1
    kind: Secret
    metadata:
      name: regular-ca-secret
      namespace: default
    type: Opaque
    data:
      ca.crt: 
