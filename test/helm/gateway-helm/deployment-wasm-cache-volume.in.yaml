# This test verifies that the Wasm module cache volume source can be
# overridden, e.g. to mount a PersistentVolumeClaim instead of an emptyDir.
global:
  images:
    envoyGateway:
      image: "docker.io/envoyproxy/gateway-dev:latest"
      pullPolicy: Always

deployment:
  envoyGateway:
    wasmCacheVolume:
      persistentVolumeClaim:
        claimName: envoy-gateway-wasm-cache
