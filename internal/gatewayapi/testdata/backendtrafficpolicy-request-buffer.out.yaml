backendTrafficPolicies:
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: BackendTrafficPolicy
    metadata:
      name: policy-for-route
      namespace: default
    spec:
      targetRef:
        group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: httproute-2
      requestBuffer:
        limit: 4Mi
    status:
      ancestors:
        - ancestorRef:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: gateway-2
            namespace: envoy-gateway
            sectionName: http
          conditions:
            - lastTransitionTime: null
              message: Policy has been accepted.
              reason: Accepted
              status: "True"
              type: Accepted
          controllerName: gateway.envoyproxy.io/gatewayclass-controller
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: BackendTrafficPolicy
    metadata:
      name: policy-for-gateway
      namespace: envoy-gateway
    spec:
      targetRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: gateway-1
      requestBuffer:
        limit: 4Mi
    status:
      ancestors:
        - ancestorRef:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: gateway-1
