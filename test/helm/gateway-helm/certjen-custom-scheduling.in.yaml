global:
  imageRegistry: "docker.io"

deployment:
  envoyGateway:
    image:
      repository: "envoyproxy/gateway-dev"
      tag: "latest"
    imagePullPolicy: Always

certgen:
  job:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: label1
              operator: In
              values:
              - value1
    tolerations:
      - effect: NoSchedule
        key: taint1
        operator: Equal
        value: tol1
