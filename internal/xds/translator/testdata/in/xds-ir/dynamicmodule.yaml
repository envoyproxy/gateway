http:
- address: 0.0.0.0
  hostnames:
  - '*'
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      name: httproute/default/httproute-1/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-1/rule/0/backend/0
    hostname: www.example.com
    isHTTP2: false
    name: httproute/default/httproute-1/rule/0/match/0/www_example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /foo
    envoyExtensions:
      dynamicModules:
      - config:
          maxTokensPerMinute: 10000
        doNotClose: true
        implementationName: token-ratelimit
        loadGlobally: true
        path: /usr/lib/envoy/modules/ai_gateway.so
        name: envoyextensionpolicy/default/policy-for-http-route/dynamic-module/0
        terminalFilter: false
  - destination:
      name: httproute/default/httproute-2/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-2/rule/0/backend/0
    hostname: www.example.com
    isHTTP2: false
    name: httproute/default/httproute-2/rule/0/match/0/www_example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /bar
    envoyExtensions:
      dynamicModules:
      - config:
          authEndpoint: https://auth.example.com
        doNotClose: false
        implementationName: auth-check
        loadGlobally: false
        path: /usr/lib/envoy/modules/my_auth.so
        name: envoyextensionpolicy/envoy-gateway/policy-for-gateway/dynamic-module/0
        terminalFilter: false
      - config:
          authEndpoint: https://remote-auth.example.com
        doNotClose: false
        implementationName: remote-auth-check
        loadGlobally: false
        name: envoyextensionpolicy/envoy-gateway/policy-for-gateway/dynamic-module/1
        remote:
          url: https://modules.example.com/libremote_auth.so
          sha256: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
        terminalFilter: false
  - destination:
      name: httproute/default/httproute-3/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-3/rule/0/backend/0
    hostname: www.example.com
    isHTTP2: false
    name: httproute/default/httproute-3/rule/0/match/0/www_example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /terminal
    envoyExtensions:
      dynamicModules:
      - doNotClose: false
        implementationName: handler
        loadGlobally: false
        path: /usr/lib/envoy/modules/my_handler.so
        name: envoyextensionpolicy/default/policy-terminal/dynamic-module/0
        terminalFilter: true
  - destination:
      name: httproute/default/httproute-4/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-4/rule/0/backend/0
    hostname: www.example.com
    isHTTP2: false
    name: httproute/default/httproute-4/rule/0/match/0/www_example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /path-loaded
    envoyExtensions:
      dynamicModules:
      - doNotClose: false
        implementationName: path-filter
        loadGlobally: false
        path: /opt/modules/my_module.so
        name: envoyextensionpolicy/default/policy-path/dynamic-module/0
        terminalFilter: false
