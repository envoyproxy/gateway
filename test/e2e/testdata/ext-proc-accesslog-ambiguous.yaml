---
# Scenario 2: second route+EEP reusing "auth-proc" on the same listener (port 8083).
# Applied explicitly after eep1 is accepted to guarantee eep1 wins the name claim.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ext-proc-accesslog-route2
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: ext-proc-accesslog-gtw
      sectionName: http-8083
  hostnames: ["accesslog.example.com"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /route2
      backendRefs:
        - name: infra-backend-v1
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: ext-proc-accesslog-eep2
  namespace: gateway-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ext-proc-accesslog-route2
  extProc:
    - name: auth-proc
      failOpen: true
      processingMode:
        request: {}
      backendRefs:
        - name: grpc-ext-proc
          namespace: gateway-conformance-infra
          port: 9002
