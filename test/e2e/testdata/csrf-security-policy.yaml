apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-with-csrf
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /csrf
    backendRefs:
    - name: infra-backend-v1
      port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: csrf-with-additional-origins
  namespace: gateway-conformance-infra
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: http-with-csrf
  csrf:
    additionalOrigins:
    - type: Exact
      value: "www.example.com"
    - type: Prefix
      value: "app.example"
    - type: Suffix
      value: ".trusted.com"
    - type: RegularExpression
      value: ".*\\.partner\\.com$"
