http:
  - address: 0.0.0.0
    externalPort: 443
    hostnames:
      - "*"
    metadata:
      kind: Gateway
      name: client-validation-insecure-fallback
      namespace: envoy-gateway
      sectionName: https
    name: envoy-gateway/client-validation-insecure-fallback/https
    path:
      escapedSlashesAction: UnescapeAndRedirect
      mergeSlashes: true
    port: 10443
    tls:
      alpnProtocols: null
      caCertificate:
        certificate: 
        name: gateway/envoy-gateway/client-validation-insecure-fallback/default/ca.crt
      certificates:
        - certificate: 
          name: envoy-gateway/tls-validity-checks-certificate
          privateKey: "[redacted]"
      requireClientCertificate: true
      clientValidationEnabled: true
  - address: 0.0.0.0
    externalPort: 8443
    hostnames:
      - second-example.org
    metadata:
      kind: Gateway
      name: client-validation-insecure-fallback
      namespace: envoy-gateway
      sectionName: https-with-hostname
    name: envoy-gateway/client-validation-insecure-fallback/https-with-hostname
    path:
      escapedSlashesAction: UnescapeAndRedirect
      mergeSlashes: true
    port: 8443
    tls:
      alpnProtocols: null
      caCertificate:
        certificate: 
        name: gateway/envoy-gateway/client-validation-insecure-fallback/8443/ca.crt
      certificates:
        - certificate: 
          name: envoy-gateway/tls-validity-checks-certificate
          privateKey: "[redacted]"
      acceptUntrusted: true
      clientValidationEnabled: true
