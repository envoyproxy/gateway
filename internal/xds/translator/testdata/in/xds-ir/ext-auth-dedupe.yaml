http:
  - address: 0.0.0.0
    hostnames:
      - '*'
    name: default/gateway-1/http
    path:
      escapedSlashesAction: UnescapeAndRedirect
      mergeSlashes: true
    port: 10080
    routes:
      # Two routes protected by two DIFFERENT SecurityPolicies (different policy
      # names, hence different IR destination names) that point at the SAME ext
      # auth backend. They must collapse onto a single upstream cluster, while
      # each policy keeps its own filter and its own context extensions.
      - name: httproute/default/httproute-1/rule/0/match/0/www_foo_com
        hostname: www.foo.com
        isHTTP2: false
        pathMatch:
          distinct: false
          name: ""
          prefix: /foo1
        destination:
          name: httproute/default/httproute-1/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              protocol: HTTP
              weight: 1
              name: httproute/default/httproute-1/rule/0/backend/0
        security:
          extAuth:
            name: securitypolicy/default/policy-a
            failOpen: false
            grpc:
              authority: grpc-backend.default:9000
              destination:
                name: securitypolicy/default/policy-a/default/grpc-backend
                metadata:
                  kind: SecurityPolicy
                  name: policy-a
                  namespace: default
                settings:
                  - addressType: IP
                    endpoints:
                      - host: 8.8.8.8
                        port: 9000
                    protocol: GRPC
                    weight: 1
                    name: securitypolicy/default/policy-a/default/grpc-backend/backend/0
            contextExtensions:
              - name: policy
                value: YQ==
      - name: httproute/default/httproute-2/rule/0/match/0/www_bar_com
        hostname: www.bar.com
        isHTTP2: false
        pathMatch:
          distinct: false
          name: ""
          prefix: /bar
        destination:
          name: httproute/default/httproute-2/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              protocol: HTTP
              weight: 1
              name: httproute/default/httproute-2/rule/0/backend/0
        security:
          extAuth:
            name: securitypolicy/default/policy-b
            failOpen: true
            grpc:
              authority: grpc-backend.default:9000
              destination:
                name: securitypolicy/default/policy-b/default/grpc-backend
                metadata:
                  kind: SecurityPolicy
                  name: policy-b
                  namespace: default
                settings:
                  - addressType: IP
                    endpoints:
                      - host: 8.8.8.8
                        port: 9000
                    protocol: GRPC
                    weight: 1
                    name: securitypolicy/default/policy-b/default/grpc-backend/backend/0
            contextExtensions:
              - name: policy
                value: Yg==
