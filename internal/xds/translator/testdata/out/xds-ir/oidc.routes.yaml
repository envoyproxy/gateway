- ignorePortInHostMatching: true
  name: first-listener
  virtualHosts:
  - domains:
    - '*'
    name: first-listener/*
    routes:
    - match:
        path: foo
      name: first-route
      route:
        cluster: first-route-dest
        upgradeConfigs:
        - upgradeType: websocket
      typedPerFilterConfig:
        envoy.filters.http.lua/oidc-id-token-forward/-1:
          '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
          sourceCode:
            inlineString: |
              function envoy_on_request(handle)
                local headers = handle:headers()
                local cookie_header = headers:get("cookie")
                if cookie_header == nil then
                  return
                end

                local token = nil
                for cookie in string.gmatch(cookie_header, "([^;]+)") do
                  local trimmed = string.match(cookie, "^%s*(.-)%s*$")
                  local separator = string.find(trimmed, "=", 1, true)
                  if separator ~= nil then
                    local name = string.sub(trimmed, 1, separator - 1)
                    local value = string.sub(trimmed, separator + 1)
                    if name == "IdToken-5F93C2E4" and value ~= "" then
                      token = value
                      break
                    end
                  end
                end

                if token == nil then
                  return
                end

                headers:replace("x-eg-id-token", string.format("%s", token))
              end
        envoy.filters.http.oauth2:
          '@type': type.googleapis.com/envoy.extensions.filters.http.oauth2.v3.OAuth2PerRoute
          config:
            authScopes:
            - openid
            - email
            - profile
            authType: BASIC_AUTH
            authorizationEndpoint: https://oauth.foo.com/oauth2/v2/auth
            credentials:
              clientId: client.oauth.foo.com
              cookieNames:
                bearerToken: AccessToken-5F93C2E4
                idToken: IdToken-5F93C2E4
                oauthExpires: OauthExpires-5F93C2E4
                oauthHmac: OauthHMAC-5F93C2E4
                oauthNonce: OauthNonce-5F93C2E4
                refreshToken: RefreshToken-5F93C2E4
              hmacSecret:
                name: oauth2/hmac_secret/securitypolicy/default/policy-for-first-route
                sdsConfig:
                  ads: {}
                  resourceApiVersion: V3
              tokenSecret:
                name: oauth2/client_secret/securitypolicy/default/policy-for-first-route
                sdsConfig:
                  ads: {}
                  resourceApiVersion: V3
            csrfTokenExpiresIn: 2100s
            defaultExpiresIn: 3600s
            defaultRefreshTokenExpiresIn: 172800s
            forwardBearerToken: true
            redirectPathMatcher:
              path:
                exact: /foo/oauth2/callback
            redirectUri: https://www.example.com/foo/oauth2/callback
            resources:
            - api
            signoutPath:
              path:
                exact: /foo/logout
            statPrefix: securitypolicy/default/policy-for-first-route
            tokenEndpoint:
              cluster: oauth_foo_com_443
              timeout: 10s
              uri: https://oauth.foo.com/token
            useRefreshToken: true
    - match:
        path: bar
      name: second-route
      route:
        cluster: second-route-dest
        upgradeConfigs:
        - upgradeType: websocket
      typedPerFilterConfig:
        envoy.filters.http.lua/oidc-id-token-forward/-1:
          '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
          sourceCode:
            inlineString: |
              function envoy_on_request(handle)
                local headers = handle:headers()
                local cookie_header = headers:get("cookie")
                if cookie_header == nil then
                  return
                end

                local token = nil
                for cookie in string.gmatch(cookie_header, "([^;]+)") do
                  local trimmed = string.match(cookie, "^%s*(.-)%s*$")
                  local separator = string.find(trimmed, "=", 1, true)
                  if separator ~= nil then
                    local name = string.sub(trimmed, 1, separator - 1)
                    local value = string.sub(trimmed, separator + 1)
                    if name == "CustomIdTokenOverride" and value ~= "" then
                      token = value
                      break
                    end
                  end
                end

                if token == nil then
                  return
                end

                headers:replace("Authorization", string.format("Bearer %s", token))
              end
        envoy.filters.http.oauth2:
          '@type': type.googleapis.com/envoy.extensions.filters.http.oauth2.v3.OAuth2PerRoute
          config:
            authScopes:
            - openid
            - email
            - profile
            authType: BASIC_AUTH
            authorizationEndpoint: https://oauth.bar.com/oauth2/v2/auth
            credentials:
              clientId: client.oauth.bar.com
              cookieDomain: example.com
              cookieNames:
                bearerToken: CustomAccessTokenOverride
                idToken: CustomIdTokenOverride
                oauthExpires: OauthExpires-5f93c2e4
                oauthHmac: OauthHMAC-5f93c2e4
                oauthNonce: OauthNonce-5f93c2e4
                refreshToken: RefreshToken-5f93c2e4
              hmacSecret:
                name: oauth2/hmac_secret/securitypolicy/default/policy-for-second-route
                sdsConfig:
                  ads: {}
                  resourceApiVersion: V3
              tokenSecret:
                name: oauth2/client_secret/securitypolicy/default/policy-for-second-route
                sdsConfig:
                  ads: {}
                  resourceApiVersion: V3
            denyRedirectMatcher:
            - name: test-exact
              stringMatch:
                exact: /api
            - name: test-regex
              stringMatch:
                safeRegex:
                  regex: .*
            - name: test-suffix
              stringMatch:
                suffix: bar
            - name: test-prefix
              stringMatch:
                prefix: foo
            - name: test-no-type
              stringMatch:
                exact: foobar
            disableTokenEncryption: true
            preserveAuthorizationHeader: true
            redirectPathMatcher:
              path:
                exact: /bar/oauth2/callback
            redirectUri: https://www.example.com/bar/oauth2/callback
            resources:
            - api
            signoutPath:
              path:
                exact: /bar/logout
            statPrefix: securitypolicy/default/policy-for-second-route
            tokenEndpoint:
              cluster: oauth_bar_com_443
              timeout: 10s
              uri: https://oauth.bar.com/token
            useRefreshToken: false
