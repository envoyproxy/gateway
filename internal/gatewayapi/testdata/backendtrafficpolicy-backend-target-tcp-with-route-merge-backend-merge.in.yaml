gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    name: gateway-1
    namespace: default
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: tcp
      protocol: TCP
      port: 8163
      allowedRoutes:
        kinds:
        - kind: TCPRoute
          group: gateway.networking.k8s.io
tcpRoutes:
- apiVersion: gateway.networking.k8s.io/v1alpha2
  kind: TCPRoute
  metadata:
    namespace: default
    name: tcproute-1
  spec:
    parentRefs:
    - name: gateway-1
      sectionName: tcp
    rules:
    - backendRefs:
      - name: service-1
        port: 8163
backendTrafficPolicies:
# Gateway BTP: sets tcpKeepalive
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: BackendTrafficPolicy
  metadata:
    namespace: default
    name: policy-for-gateway
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-1
    tcpKeepalive:
      probes: 1
# Backend BTP with mergeType: sets circuitBreaker, merges with gateway
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: BackendTrafficPolicy
  metadata:
    namespace: default
    name: policy-for-service-1
  spec:
    mergeType: StrategicMerge
    targetRefs:
    - group: ""
      kind: Service
      name: service-1
    circuitBreaker:
      maxConnections: 100
# Route BTP with mergeType: sets loadBalancer, merges with merge(gateway, backend)
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: BackendTrafficPolicy
  metadata:
    namespace: default
    name: policy-for-route-1
  spec:
    mergeType: StrategicMerge
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      name: tcproute-1
    loadBalancer:
      type: RoundRobin
