---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: eep-merged-route
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
    sectionName: http
  hostnames: ["www.example.com"]
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /merged
    backendRefs:
    - name: infra-backend-v1
      port: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eep-merged-parent-lua
  namespace: gateway-conformance-infra
data:
  lua: |
    function envoy_on_response(response_handle)
      response_handle:headers():add("X-Custom-Lua-Header", "merged-parent")
    end
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: eep-merged-gateway
  namespace: gateway-conformance-infra
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: same-namespace
  lua:
  - type: ValueRef
    valueRef:
      name: eep-merged-parent-lua
      kind: ConfigMap
      group: v1
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: eep-merged-grpc-ext-proc-btls
  namespace: gateway-conformance-infra
spec:
  targetRefs:
  - group: ''
    kind: Service
    name: grpc-ext-proc
    sectionName: grpc
  validation:
    caCertificateRefs:
    - name: grpc-ext-proc-ca
      group: ''
      kind: ConfigMap
    hostname: grpc-ext-proc.envoygateway
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: eep-merged-route
  namespace: gateway-conformance-infra
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: eep-merged-route
  mergeType: StrategicMerge
  extProc:
  - backendRefs:
    - name: grpc-ext-proc
      namespace: gateway-conformance-infra
      port: 9002
    processingMode:
      request: {}
      response: {}
