gatewayClass:
  apiVersion: gateway.networking.k8s.io/v1
  kind: GatewayClass
  metadata:
    name: envoy-gateway-class
  spec:
    controllerName: gateway.envoyproxy.io/gatewayclass-controller
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    name: gateway-1
    namespace: envoy-gateway
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - allowedRoutes:
        namespaces:
          from: All
      hostname: sds.example.com
      name: sds-multiple
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
        - name: sds-cert-default
        - name: sds-cert-other
        mode: Terminate
    - allowedRoutes:
        namespaces:
          from: All
      hostname: inline.example.com
      name: inline-same-port
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
        - name: envoy
          namespace: envoy-gateway-system
        mode: Terminate
    - allowedRoutes:
        namespaces:
          from: All
      name: sds-mixed
      port: 8443
      protocol: HTTPS
      tls:
        certificateRefs:
        - name: sds-cert-default
        - name: envoy
          namespace: envoy-gateway-system
        mode: Terminate
    - allowedRoutes:
        namespaces:
          from: All
      name: sds-tls-terminate
      port: 9443
      protocol: TLS
      tls:
        certificateRefs:
        - name: sds-cert-default
        mode: Terminate
    - allowedRoutes:
        namespaces:
          from: All
      name: sds-cross-namespace
      port: 11443
      protocol: HTTPS
      tls:
        certificateRefs:
        - name: sds-cert-cross
          namespace: sds-secrets
        mode: Terminate
