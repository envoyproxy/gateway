http:
  - address: 0.0.0.0
    externalPort: 80
    hostnames:
      - app1.gateway.envoyproxy.io
    metadata:
      kind: Gateway
      name: gateway-2
      namespace: envoy-gateway
      sectionName: http-app1
    name: envoy-gateway/gateway-2/http-app1
    path:
      escapedSlashesAction: UnescapeAndRedirect
      mergeSlashes: true
    port: 10080
    routes:
      - destination:
          metadata:
            kind: HTTPRoute
            name: httproute-1
            namespace: default
          name: httproute/default/httproute-1/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              metadata:
                kind: Service
                name: service-1
                namespace: default
                sectionName: "8080"
              name: httproute/default/httproute-1/rule/0/backend/0
              protocol: HTTP
              weight: 1
        hostname: app1.gateway.envoyproxy.io
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-1
          namespace: default
          policies:
            - kind: BackendTrafficPolicy
              name: policy-for-route
              namespace: default
        name: httproute/default/httproute-1/rule/0/match/0/app1_gateway_envoyproxy_io
        pathMatch:
          distinct: false
          name: ""
          prefix: /
        traffic:
          rateLimit:
            global:
              rules:
                - cidrMatch:
                    cidr: 192.168.0.0/16
                    distinct: true
                    invert: false
                    isIPv6: false
                    maskLen: 16
                  headerMatches: []
                  limit:
                    requests: 20
                    unit: Hour
                  name: default/policy-for-route/rule/0
                  pathMatch:
                    distinct: false
                    name: ""
                    prefix: /
