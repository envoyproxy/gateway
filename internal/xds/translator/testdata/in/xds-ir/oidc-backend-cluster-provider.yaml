http:
- name: "first-listener"
  address: "::"
  port: 10080
  hostnames:
  - "*"
  path:
    mergeSlashes: true
    escapedSlashesAction: UnescapeAndRedirect
  routes:
  - name: "first-route"
    hostname: "*"
    pathMatch:
      exact: "baz"
    destination:
      name: "third-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          port: 50000
        name: "third-route-dest/backend/0"
    security:
      oidc:
        name: securitypolicy/envoy-gateway/policy-for-gateway
        clientID: client1.apps.googleusercontent.com
        clientSecret: Y2xpZW50MTpzZWNyZXQK
        cookieSuffix: b0a1b740
        defaultRefreshTokenTTL: 24h0m0s
        defaultTokenTTL: 30m0s
        forwardAccessToken: true
        hmacSecret: qrOYACHXoe7UEDI/raOjNSx+Z9ufXSc/22C3T6X/zPY=
        logoutPath: /bar/logout
        provider:
          authorizationEndpoint: https://oauth.foo.com/oauth2/v2/auth
          destination:
            name: securitypolicy/envoy-gateway/policy-for-gateway/0
            settings:
            - addressType: FQDN
              endpoints:
              - host: oauth.foo.com
                port: 443
              protocol: HTTPS
              weight: 1
              name: securitypolicy/envoy-gateway/policy-for-gateway/0/backend/0
              tls:
                alpnProtocols: null
                caCertificate:
                  certificate: 
                  name: policy-btls-backend-fqdn/envoy-gateway-ca
                clientCertificates:
                - certificate: 
                  name: default/oidc-tls
                  privateKey: "[redacted]"
                sni: oauth.foo.com
          tokenEndpoint: https://oauth.foo.com/token
          traffic:
            backendConnection:
              bufferLimit: 100000000
            circuitBreaker:
              maxConnections: 2048
              maxParallelRequests: 4294967295
              maxParallelRetries: 1024
              maxPendingRequests: 1
              maxRequestsPerConnection: 1
            dns:
              dnsRefreshRate: 30s
              lookupFamily: IPv4AndIPv6
            healthCheck:
              active:
                healthyThreshold: 1
                http:
                  expectedResponse:
                    binary: RXZlcnl0aGluZyBPSw==
                  expectedStatuses:
                  - 200
                  - 300
                  host: ""
                  method: GET
                  path: /healthz
                interval: 3s
                timeout: 500ms
                unhealthyThreshold: 3
              passive:
                baseEjectionTime: 2m40s
                consecutive5XxErrors: 5
                consecutiveGatewayErrors: 0
                consecutiveLocalOriginFailures: 5
                interval: 2s
                maxEjectionPercent: 100
                splitExternalLocalOriginErrors: false
            loadBalancer:
              consistentHash:
                sourceIP: true
            retry:
              numRetries: 3
              perRetry:
                backOff:
                  baseInterval: 500ms
                  maxInterval: 5s
              retryOn:
                triggers:
                - "5xx"
                - gateway-error
                - reset
            tcpKeepalive:
              idleTime: 1200
              interval: 60
              probes: 3
            timeout:
              http:
                connectionIdleTimeout: 16s
                maxConnectionDuration: 17s
                requestTimeout: 5s
              tcp:
                connectTimeout: 15s
        redirectPath: /bar/oauth2/callback
        redirectURL: https://www.example.com/bar/oauth2/callback
        refreshToken: true
        scopes:
        - openid
