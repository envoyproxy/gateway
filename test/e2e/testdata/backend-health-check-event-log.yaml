---
# Route without health checks — used to wait for the gateway to be ready
# before applying the HC-enabled route and BTP.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-without-hc-event-log
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: same-namespace
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /no-hc-event-log
      backendRefs:
        - name: infra-backend-v1
          port: 8080
