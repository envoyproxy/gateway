clientTrafficPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: ClientTrafficPolicy
  metadata:
    namespace: envoy-gateway
    name: target-gateway-1
  spec:
    headers:
      earlyRequestHeaders:
        mutations:
        - write:
            header:
              name: "Example/Header/1"
              value: "valid"
            action: Overwrite
        - write:
            header:
              name: "example-header-2"
              value: "  invalid"
            action: Append
        - remove: ""
        - write:
            header:
              name: "example-header-3"
              value: "valid"
            action: Append
    targetRef:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-1
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http-1
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
