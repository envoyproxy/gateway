global:
  images:
    envoyGateway:
      image: "docker.io/envoyproxy/gateway-dev:latest"
      pullPolicy: Always

deployment:
  pod:
    extraVolumeMounts:
     - name: foo
       mountPath: "/etc/foo"
       readOnly: true
    extraVolumes:
     - name: foo
       configMap:
         name: myconfigmap
