name: setup-deps
description: Install host system dependencies

runs:
  using: composite
  steps:
    - shell: bash
      run: sudo apt-get install libbtrfs-dev -y
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.2
      with:
        go-version-file: go.mod
        cache: true
