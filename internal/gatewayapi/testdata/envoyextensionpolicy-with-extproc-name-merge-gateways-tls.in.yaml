envoyProxyForGatewayClass:
  apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyProxy
  metadata:
    namespace: envoy-gateway-system
    name: test
  spec:
    mergeGateways: true
# Under MergeGateways, TLS listeners on the same port each get their own FilterChain
# and HCM, so name registries are isolated. Both policies use name "auth" — no conflict.
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.example.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
        - name: tls-secret-example-com
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: gateway-2
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: foo.bar.com
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
        - name: tls-secret-foo-bar-com
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: envoy-gateway
    name: httproute-1
  spec:
    hostnames:
    - foo.example.com
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-1
      sectionName: https
    rules:
    - matches:
      - path:
          value: /foo
      backendRefs:
      - name: service-1
        port: 8080
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: envoy-gateway
    name: httproute-2
  spec:
    hostnames:
    - foo.bar.com
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-2
      sectionName: https
    rules:
    - matches:
      - path:
          value: /bar
      backendRefs:
      - name: service-1
        port: 8080
services:
- apiVersion: v1
  kind: Service
  metadata:
    namespace: envoy-gateway
    name: grpc-backend-1
  spec:
    ports:
    - port: 9000
      name: grpc
      protocol: TCP
- apiVersion: v1
  kind: Service
  metadata:
    namespace: envoy-gateway
    name: grpc-backend-2
  spec:
    ports:
    - port: 9000
      name: grpc
      protocol: TCP
- apiVersion: v1
  kind: Service
  metadata:
    namespace: envoy-gateway
    name: service-1
  spec:
    ports:
    - port: 8080
      name: http
      protocol: TCP
endpointSlices:
- apiVersion: discovery.k8s.io/v1
  kind: EndpointSlice
  metadata:
    name: endpointslice-grpc-backend-1
    namespace: envoy-gateway
    labels:
      kubernetes.io/service-name: grpc-backend-1
  addressType: IPv4
  ports:
  - name: grpc
    protocol: TCP
    port: 9000
  endpoints:
  - addresses:
    - 7.7.7.7
    conditions:
      ready: true
- apiVersion: discovery.k8s.io/v1
  kind: EndpointSlice
  metadata:
    name: endpointslice-grpc-backend-2
    namespace: envoy-gateway
    labels:
      kubernetes.io/service-name: grpc-backend-2
  addressType: IPv4
  ports:
  - name: grpc
    protocol: TCP
    port: 9000
  endpoints:
  - addresses:
    - 8.8.8.8
    conditions:
      ready: true
- apiVersion: discovery.k8s.io/v1
  kind: EndpointSlice
  metadata:
    name: endpointslice-service-1
    namespace: envoy-gateway
    labels:
      kubernetes.io/service-name: service-1
  addressType: IPv4
  ports:
  - name: http
    protocol: TCP
    port: 8080
  endpoints:
  - addresses:
    - 1.1.1.1
    conditions:
      ready: true
secrets:
- apiVersion: v1
  kind: Secret
  metadata:
    namespace: envoy-gateway
    name: tls-secret-example-com
  type: kubernetes.io/tls
  data:   # foo.example.com *.example.com
    tls.crt: 
    tls.key: 
- apiVersion: v1
  kind: Secret
  metadata:
    namespace: envoy-gateway
    name: tls-secret-foo-bar-com
  type: kubernetes.io/tls
  data:   # foo.bar.com
    tls.crt: 
    tls.key: 
envoyExtensionPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: envoy-gateway
    name: policy-for-httproute-1
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-1
    extProc:
    - name: auth
      backendRefs:
      - name: grpc-backend-1
        port: 9000
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: envoy-gateway
    name: policy-for-httproute-2
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-2
    extProc:
    - name: auth
      backendRefs:
      - name: grpc-backend-2
        port: 9000
