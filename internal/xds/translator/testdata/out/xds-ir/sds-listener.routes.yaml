- ignorePortInHostMatching: true
  name: test1
  virtualHosts:
  - domains:
    - '*'
    name: test1/*
    routes:
    - match:
        prefix: /
      name: route1
      route:
        cluster: test1-dest
        upgradeConfigs:
        - upgradeType: websocket
