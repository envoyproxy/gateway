globalResources:
  envoyClientCertificate:
    name: envoy-gateway-system/envoy
    privateKey: [107, 101, 121, 45, 100, 97, 116, 97]
    certificate: [99, 101, 114, 116, 45, 100, 97, 116, 97]
http:
- address: 0.0.0.0
  hostnames:
  - '*'
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      name: httproute/default/httproute-1/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-1/rule/0/backend/0
    hostname: www.example.com
    isHTTP2: false
    name: httproute/default/httproute-1/rule/0/match/0/www_example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /foo
    envoyExtensions:
      wasms:
      - config:
          mode: enforce
        failOpen: false
        path: /var/lib/envoy/security-filter.wasm
        name: envoyextensionpolicy/envoy-gateway/policy-for-gateway/wasm/0
        wasmName: wasm-filter-1
  - destination:
      name: httproute/default/httproute-2/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-2/rule/0/backend/0
    hostname: www.example.com
    isHTTP2: false
    name: httproute/default/httproute-2/rule/0/match/0/www_example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /bar
    envoyExtensions:
      wasms:
      - config: null
        failOpen: true
        path: /opt/wasm/metrics.wasm
        name: envoyextensionpolicy/default/policy-for-http-route/wasm/0
        wasmName: wasm-filter-2
        rootID: my-root-id
