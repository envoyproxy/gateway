http:
- name: "first-listener"
  address: "::"
  port: 10080
  hostnames:
  - "*"
  path:
    mergeSlashes: true
    escapedSlashesAction: UnescapeAndRedirect
  routes:
  - name: "first-route"
    hostname: "*"
    pathMatch:
      exact: "foo/bar"
    destination:
      name: "first-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          port: 50000
        name: "first-route-dest/backend/0"
    security:
      csrf:
        additionalOrigins:
        - exact: www.example.com
        - prefix: app.example
        - suffix: .trusted.com
        - safeRegex: .*\.partner\.com$
  - name: "second-route"
    hostname: "*"
    pathMatch:
      exact: "bar/baz"
    destination:
      name: "second-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          port: 50001
        name: "second-route-dest/backend/0"
    security:
      csrf:
        filterEnabled: 50
        shadowEnabled: 25
        additionalOrigins:
        - exact: staging.example.com

