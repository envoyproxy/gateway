xdsIR:
  envoy-gateway/gateway-1:
    accessLog:
      json:
      - path: /dev/stdout
    http:
    - address: 0.0.0.0
      hostnames:
      - '*'
      isHTTP2: false
      metadata:
        kind: Gateway
        name: gateway-1
        namespace: envoy-gateway
        sectionName: http
      name: envoy-gateway/gateway-1/http
      path:
        escapedSlashesAction: UnescapeAndRedirect
        mergeSlashes: true
      port: 10080
      routes:
      - destination:
          metadata:
            kind: HTTPRoute
            name: httproute-1
            namespace: default
          name: httproute/default/httproute-1/rule/0
          settings:
          - addressType: IP
            endpoints:
            - host: 7.7.7.7
              port: 8080
            metadata:
              name: service-1
              namespace: default
              sectionName: "8080"
            name: httproute/default/httproute-1/rule/0/backend/0
            protocol: HTTP
            weight: 1
        envoyExtensions:
          extProcs:
          - authority: grpc-backend-2.default:8000
            destination:
              metadata:
                kind: EnvoyExtensionPolicy
                name: policy-for-route-1
                namespace: default
              name: envoyextensionpolicy/default/policy-for-route-1/extproc/0
              settings:
              - addressType: IP
                endpoints:
                - host: 8.8.8.8
                  port: 8000
                metadata:
                  kind: Service
                  name: grpc-backend-2
                  namespace: default
                  sectionName: "8000"
                name: envoyextensionpolicy/default/policy-for-route-1/extproc/0/backend/0
                protocol: GRPC
                weight: 1
            name: envoyextensionpolicy/default/policy-for-route-1/extproc/0
        hostname: gateway.envoyproxy.io
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-1
          namespace: default
        name: httproute/default/httproute-1/rule/0/match/0/gateway_envoyproxy_io
        pathMatch:
          distinct: false
          name: ""
          prefix: /foo
      - destination:
          metadata:
            kind: HTTPRoute
            name: httproute-2
            namespace: default
          name: httproute/default/httproute-2/rule/0
          settings:
          - addressType: IP
            endpoints:
            - host: 7.7.7.7
              port: 8080
            metadata:
              name: service-1
              namespace: default
              sectionName: "8080"
            name: httproute/default/httproute-2/rule/0/backend/0
            protocol: HTTP
            weight: 1
        envoyExtensions:
          extProcs:
          - authority: grpc-backend.envoy-gateway:9000
            destination:
              metadata:
                kind: EnvoyExtensionPolicy
                name: policy-for-gateway-1
                namespace: envoy-gateway
              name: envoyextensionpolicy/envoy-gateway/policy-for-gateway-1/extproc/0
              settings:
              - addressType: IP
                endpoints:
                - host: 7.7.7.7
                  port: 9000
                metadata:
                  kind: Service
                  name: grpc-backend
                  namespace: envoy-gateway
                  sectionName: "9000"
                name: envoyextensionpolicy/envoy-gateway/policy-for-gateway-1/extproc/0/backend/0
                protocol: GRPC
                weight: 1
            name: envoyextensionpolicy/envoy-gateway/policy-for-gateway-1/extproc/0
        hostname: gateway.envoyproxy.io
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-2
          namespace: default
        name: httproute/default/httproute-2/rule/0/match/0/gateway_envoyproxy_io
        pathMatch:
          distinct: false
          name: ""
          prefix: /bar
      - destination:
          metadata:
            kind: HTTPRoute
            name: httproute-3
            namespace: default
          name: httproute/default/httproute-3/rule/0
          settings:
          - addressType: IP
            endpoints:
            - host: 7.7.7.7
              port: 8080
            metadata:
              name: service-1
              namespace: default
              sectionName: "8080"
            name: httproute/default/httproute-3/rule/0/backend/0
            protocol: HTTP
            weight: 1
        envoyExtensions: {}
        hostname: gateway.envoyproxy.io
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-3
          namespace: default
        name: httproute/default/httproute-3/rule/0/match/0/gateway_envoyproxy_io
