        metadata:
          kind: HTTPRoute
          name: httproute-1
          namespace: default
        name: httproute/default/httproute-1/rule/0/match/0/foo_com
        pathMatch:
          distinct: false
          name: ""
          prefix: /
    - address: 0.0.0.0
      externalPort: 8162
