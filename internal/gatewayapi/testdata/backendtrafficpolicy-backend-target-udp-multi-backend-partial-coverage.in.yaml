gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    name: gateway-1
    namespace: default
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: udp
      protocol: UDP
      port: 8162
      allowedRoutes:
        kinds:
        - kind: UDPRoute
          group: gateway.networking.k8s.io
udpRoutes:
# UDP route splits traffic to service-1 (has BTP) and service-2 (no BTP) → partial coverage → conflict
- apiVersion: gateway.networking.k8s.io/v1alpha2
  kind: UDPRoute
  metadata:
    namespace: default
    name: udproute-1
  spec:
    parentRefs:
    - name: gateway-1
      sectionName: udp
    rules:
    - backendRefs:
      - name: service-1
        port: 8162
        weight: 50
      - name: service-2
        port: 8162
        weight: 50
backendTrafficPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: BackendTrafficPolicy
  metadata:
    namespace: default
    name: policy-for-service-1
  spec:
    targetRefs:
    - group: ""
      kind: Service
      name: service-1
    loadBalancer:
      type: RoundRobin
