http:
- name: "first-listener"
  address: "::"
  port: 10080
  hostnames:
  - "*"
  routes:
  - name: "backend-utilization-weighted-zones-endpoint-override-route"
    hostname: "*"
    destination:
      name: "backend-utilization-weighted-zones-endpoint-override-dest"
      settings:
      - endpoints:
        - host: "5.6.7.8"
          port: 8080
          zone: us-east-1a
        - host: "6.7.8.9"
          port: 8080
          zone: us-east-1b
        name: "backend-utilization-weighted-zones-endpoint-override-dest/backend/0"
        weight: 1
    traffic:
      loadBalancer:
        backendUtilization:
          blackoutPeriod: 10s
          weightExpirationPeriod: 60s
        weightedZones:
        - zone: us-east-1a
          weight: 80
        - zone: us-east-1b
          weight: 20
        endpointOverride:
          extractFrom:
          - header: "x-fallback-host"
