gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: gateway-tls-frontend-backend
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
        - name: https
          port: 8443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
      tls:
        frontend:
          default:
            validation:
              mode: AllowValidOnly
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: tls-validity-checks-ca-certificate
          perPort:
            - port: 8443
              tls:
                validation:
                  mode: AllowValidOnly
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: tls-validity-checks-per-port-ca-certificate
        backend:
          clientCertificateRef:
            group: ""
            kind: Secret
            name: certificate
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: invalid-default-client-validation-config
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              mode: AllowValidOnly
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: does-not-exist
          perPort:
            - port: 80
              tls:
                validation:
                  mode: AllowValidOnly
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: tls-validity-checks-per-port-ca-certificate
      listeners:
        - name: https
          port: 443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: client-validation-insecure-fallback
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              mode: AllowInsecureFallback
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: tls-validity-checks-ca-certificate
          perPort:
            - port: 8443
              tls:
                validation:
                  mode: AllowInsecureFallback
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: tls-validity-checks-per-port-ca-certificate
      listeners:
        - name: https
          port: 443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: https-with-hostname
          port: 8443
          hostname: second-example.org
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: client-validation-default
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              caCertificateRefs:
              - kind: ConfigMap
                group: ""
                name: tls-validity-checks-ca-certificate
          perPort:
          - port: 8443
            tls:
              validation:
                caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: tls-validity-checks-per-port-ca-certificate
      listeners:
      - name: https
        port: 443
        protocol: HTTPS
        allowedRoutes:
          namespaces:
            from: Same
        tls:
          certificateRefs:
          - group: ""
            kind: Secret
            name: tls-validity-checks-certificate
      - name: https-with-hostname
        port: 8443
        protocol: HTTPS
        allowedRoutes:
          namespaces:
            from: Same
        tls:
          certificateRefs:
          - group: ""
            kind: Secret
            name: tls-validity-checks-certificate
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: gateway-tls-frontend-backend
      namespace: default
    spec:
      parentRefs:
        - name: gateway-tls-frontend-backend
          namespace: envoy-gateway
      hostnames:
        - example.org
      rules:
        - backendRefs:
            - name: service-1
              port: 8080
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: invalid-default-client-validation-config
      namespace: default
    spec:
      parentRefs:
        - name: invalid-default-client-validation-config
          namespace: envoy-gateway
      hostnames:
        - example.org
      rules:
        - backendRefs:
            - name: service-1
              port: 8080
secrets:
  - apiVersion: v1
    kind: Secret
    metadata:
      namespace: envoy-gateway
      name: tls-validity-checks-certificate
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 
configmaps:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: tls-validity-checks-ca-certificate
      namespace: envoy-gateway
    data:
      ca.crt: 
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: tls-validity-checks-per-port-ca-certificate
      namespace: envoy-gateway
    data:
      ca.crt: 
