gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      namespace: default
      name: gateway-1
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      namespace: default
      name: httproute-1
    spec:
      hostnames:
        - gateway.envoyproxy.io
      parentRefs:
        - namespace: default
          name: gateway-1
          sectionName: http
      rules:
        - matches:
            - path:
                value: "/"
          backendRefs:
            - name: service-1
              port: 8080
backendTrafficPolicies:
  # The gateway policy has an invalid responseOverride body valueRef pointing
  # to a missing ConfigMap.
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: BackendTrafficPolicy
    metadata:
      namespace: default
      name: policy-for-gateway
    spec:
      targetRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: gateway-1
      responseOverride:
        - match:
            statusCodes:
              - type: Value
                value: 500
          response:
            contentType: application/json
            body:
              type: ValueRef
              valueRef:
                group: ""
                kind: ConfigMap
                name: missing-response-override-config
  # The route policy uses mergeType Replace and omits responseOverride: the
  # parent policy configuration (including its invalid ref) is discarded, so
  # this policy must be accepted and applied instead of being rejected.
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: BackendTrafficPolicy
    metadata:
      namespace: default
      name: policy-for-route
    spec:
      mergeType: Replace
      targetRefs:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: httproute-1
      retry:
        numRetries: 3
