  loadAssignment:
    clusterName: httproute/default/httproute-6/rule/1
    endpoints:
    - lbEndpoints:
      - endpoint:
          address:
            socketAddress:
              address: example2.com
              portValue: 3001
          healthCheckConfig:
            hostname: example2.com
          hostname: example2.com
        loadBalancingWeight: 1
      loadBalancingWeight: 1
      locality:
        region: httproute/default/httproute-6/rule/1/backend/0
      metadata:
        filterMetadata:
          envoy-gateway:
            resources:
            - kind: Backend
              name: backend-2
              namespace: default
    - lbEndpoints:
      - endpoint:
          address:
            socketAddress:
