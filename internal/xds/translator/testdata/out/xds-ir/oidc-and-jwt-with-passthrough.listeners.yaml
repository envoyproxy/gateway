- address:
    socketAddress:
      address: 0.0.0.0
      portValue: 10080
  defaultFilterChain:
    filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        commonHttpProtocolOptions:
          headersWithUnderscoresAction: REJECT_REQUEST
        http2ProtocolOptions:
          initialConnectionWindowSize: 1048576
          initialStreamWindowSize: 65536
          maxConcurrentStreams: 100
        httpFilters:
        - name: envoy.filters.http.oauth2
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.oauth2.v3.OAuth2
        - name: envoy.filters.http.jwt_authn
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
            providers:
              example1_080509a58e5880a9:
                forward: true
                issuer: https://oauth.foo.com
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: example1
                remoteJwks:
                  asyncFetch: {}
                  cacheDuration: 300s
                  httpUri:
                    cluster: oauth_foo_com_443
                    timeout: 10s
                    uri: https://oauth.foo.com/jwt/public-key/jwks.json
              example2_fad2a181f4b0664e:
                forward: true
                fromHeaders:
                - name: MyHeaderPrefixed
                  valuePrefix: MyPrefix
                - name: MyHeaderNoPrefix
                issuer: https://oauth.foo.com
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: example2
                remoteJwks:
                  asyncFetch: {}
                  cacheDuration: 300s
                  httpUri:
                    cluster: oauth_foo_com_443
                    timeout: 10s
                    uri: https://oauth.foo.com/jwt/public-key/jwks.json
              example3_2c73957cd9550a84:
                forward: true
                fromCookies:
                - Cookie1
                - Cookie1
                issuer: https://oauth.foo.com
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: example3
                remoteJwks:
                  asyncFetch: {}
                  cacheDuration: 300s
                  httpUri:
                    cluster: oauth_foo_com_443
                    timeout: 10s
                    uri: https://oauth.foo.com/jwt/public-key/jwks.json
              example4_fd3a3100036e2084:
                forward: true
                fromParams:
                - Param1
                - Param1
                issuer: https://oauth.foo.com
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: example4
                remoteJwks:
                  asyncFetch: {}
                  cacheDuration: 300s
                  httpUri:
                    cluster: oauth_foo_com_443
                    timeout: 10s
                    uri: https://oauth.foo.com/jwt/public-key/jwks.json
            requirementMap:
              example1-or-example2-or-example3-or-example4_f1dce4fcb58e4627:
                requiresAny:
                  requirements:
                  - providerName: example1_080509a58e5880a9
                  - providerName: example2_fad2a181f4b0664e
                  - providerName: example3_2c73957cd9550a84
                  - providerName: example4_fd3a3100036e2084
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            suppressEnvoyHeaders: true
        mergeSlashes: true
        normalizePath: true
        pathWithEscapedSlashesAction: UNESCAPE_AND_REDIRECT
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: envoy-gateway/gateway-1/http
        serverHeaderTransformation: PASS_THROUGH
        statPrefix: http-10080
        useRemoteAddress: true
    name: envoy-gateway/gateway-1/http
  maxConnectionsToAcceptPerSocketEvent: 1
  name: envoy-gateway/gateway-1/http
  perConnectionBufferLimitBytes: 32768
