http:
- name: "first-listener"
  address: "::"
  port: 10080
  hostnames:
  - "*"
  path:
    mergeSlashes: true
    escapedSlashesAction: UnescapeAndRedirect
  routes:
  - name: "first-route"
    hostname: "*"
    traffic:
      loadBalancer:
        roundRobin: {}
    destination:
      name: "first-route-dest"
      backendClusterRefs:
      - name: "first-route-dest"
  - name: "second-route"
    hostname: "*"
    traffic:
      loadBalancer:
        random: {}
    destination:
      name: "second-route-dest"
      backendClusterRefs:
      - name: "second-route-dest"
  - name: "third-route"
    hostname: "*"
    traffic:
      loadBalancer:
        leastRequest: {}
    destination:
      name: "third-route-dest"
      backendClusterRefs:
      - name: "third-route-dest"
  - name: "fourth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        consistentHash:
          sourceIP: true
    destination:
      name: "fourth-route-dest"
      backendClusterRefs:
      - name: "fourth-route-dest"
  - name: "fifth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        leastRequest:
          slowStart:
            window: 60s
    destination:
      name: "fifth-route-dest"
      backendClusterRefs:
      - name: "fifth-route-dest"
  - name: "sixth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        roundRobin:
          slowStart:
            window: 300s
    destination:
      name: "sixth-route-dest"
      backendClusterRefs:
      - name: "sixth-route-dest"
  - name: "seventh-route"
    hostname: "*"
    traffic:
      loadBalancer:
        consistentHash:
          headers:
          - name: name
    destination:
      name: "seventh-route-dest"
      backendClusterRefs:
      - name: "seventh-route-dest"
  - name: "eighth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        consistentHash:
          tableSize: 524287
    destination:
      name: "eighth-route-dest"
      backendClusterRefs:
      - name: "eighth-route-dest"
  - name: "ninth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        consistentHash:
          cookie:
            name: "test"
    destination:
      name: "ninth-route-dest"
      backendClusterRefs:
      - name: "ninth-route-dest"
  - name: "tenth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        consistentHash:
          cookie:
            name: "test"
            attributes:
              foo: bar
    destination:
      name: "tenth-route-dest"
      backendClusterRefs:
      - name: "tenth-route-dest"
  - name: "eleventh-route"
    hostname: "*"
    traffic:
      loadBalancer:
        roundRobin: {}
        endpointOverride:
          extractFrom:
          - header: "x-custom-host"
    destination:
      name: "eleventh-route-dest"
      backendClusterRefs:
      - name: "eleventh-route-dest"
  - name: "twelfth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        leastRequest: {}
        endpointOverride:
          extractFrom:
          - header: "x-fallback-host"
    destination:
      name: "twelfth-route-dest"
      backendClusterRefs:
      - name: "twelfth-route-dest"
  - name: "thirteen-route"
    hostname: "*"
    traffic:
      loadBalancer:
        leastRequest: {}
        endpointOverride:
          extractFrom:
          - header: "x-custom-host"
    destination:
      name: "thirteen-route-dest"
      backendClusterRefs:
      - name: "thirteen-route-dest"
  - name: "fourteenth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        consistentHash:
          headers:
          - name: name
          - name: bar
    destination:
      name: "fourteenth-route-dest"
      backendClusterRefs:
      - name: "fourteenth-route-dest"
  - name: "fifteenth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        consistentHash:
          queryParams:
          - name: "name"
          - name: "bar"
    destination:
      name: "fifteenth-route-dest"
      backendClusterRefs:
      - name: "fifteenth-route-dest"
  - name: "sixteenth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        backendUtilization:
          blackoutPeriod: 30s
          weightExpirationPeriod: 60s
          weightUpdatePeriod: 10s
          slowStart:
            window: 45s
          errorUtilizationPenaltyPercent: 100
          metricNamesForComputingUtilization:
          - "cpu_utilization"
    destination:
      name: "sixteenth-route-dest"
      backendClusterRefs:
      - name: "sixteenth-route-dest"
  - name: "seventeenth-route"
    hostname: "*"
    traffic:
      loadBalancer:
        backendUtilization:
          blackoutPeriod: 30s
          weightExpirationPeriod: 60s
          weightUpdatePeriod: 10s
          metricNamesForComputingUtilization:
          - "named_metric.foo"
    destination:
      name: "seventeenth-route-dest"
      backendClusterRefs:
      - name: "seventeenth-route-dest"
