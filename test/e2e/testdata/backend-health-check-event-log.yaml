apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: hc-event-log-proxy
  namespace: gateway-conformance-infra
spec:
  ipFamily: IPv4
  telemetry:
    healthCheckLog:
      sinks:
        - type: File
          file:
            path: /dev/stdout
      alwaysLogHealthCheckFailures: true
      alwaysLogHealthCheckSuccess: true
  shutdown:
    drainTimeout: 5s
    minDrainDuration: 1s
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hc-event-log-gtw
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: hc-event-log-proxy
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-with-hc-event-log
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: hc-event-log-gtw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /hc-event-log
      backendRefs:
        - name: infra-backend-v1
          port: 8080
---
# BTP with an intentionally failing health check (/status/418 never returns 200).
# With alwaysLogHealthCheckFailures=true, every probe cycle produces a failure event
# logged to stdout, which Loki collects and the test can assert against.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: hc-event-log-btp
  namespace: gateway-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: http-with-hc-event-log
  healthCheck:
    active:
      timeout: 3s
      interval: 5s
      unhealthyThreshold: 3
      healthyThreshold: 1
      type: HTTP
      http:
        path: "/status/418"
        expectedStatuses:
          - 200
