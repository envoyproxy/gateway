http:
- name: "first-listener"
  address: "::"
  port: 10080
  hostnames:
  - "*"
  http1:
    preserveHeaderCase: true
  path:
    mergeSlashes: true
    escapedSlashesAction: UnescapeAndRedirect
  routes:
  - name: "first-route"
    hostname: "*"
    destination:
      name: "first-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          port: 50000
        name: "first-route-dest/backend/0"
- name: "second-listener"
  address: "::"
  port: 10081
  hostnames:
  - "*"
  headers:
    earlyRequestHeaderMutations:
    - write:
        name: "some-header"
        value: "some-value1,some-value2"
        action: Append
    - write:
        name: "some-header-2"
        value: "some-value"
        action: Append
    - write:
        name: "some-header3"
        value: "some-value"
        action: Overwrite
    - write:
        name: "some-header4"
        value: "some-value"
        action: Overwrite
    - write:
        name: "empty-header"
        value: ""
        action: Overwrite
        keepEmptyValue: true
    - remove: "some-header5"
    - remove: "some-header6"
    - removeOnMatch:
        name: ""
        exact: my-removed-header-value
    - removeOnMatch:
        name: ""
        prefix: removed-prefix-
    - removeOnMatch:
        name: ""
        suffix: -removed-suffix
    - removeOnMatch:
        name: ""
        safeRegex: removed-regex-.*
  routes:
  - name: "second-route"
    hostname: "*"
    destination:
      name: "second-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.5"
          port: 50000
        name: "second-route-dest/backend/0"
