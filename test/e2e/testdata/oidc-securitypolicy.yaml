---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-with-oidc-foo
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  hostnames: ["www.example.com"]
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /foo                # This is the path that will be protected by OIDC
    backendRefs:
    - name: infra-backend-v1
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-with-oidc-bar
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  hostnames: ["www.example.com"]
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /bar                # This is the path that will be protected by OIDC
    backendRefs:
    - name: infra-backend-v1
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-without-oidc
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  hostnames: ["www.example.com"]
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /public            # This is the path that will be public
    backendRefs:
    - name: infra-backend-v1
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-keycloak
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  hostnames: ["keycloak.gateway-conformance-infra"]
  rules:
  - backendRefs:
    - name: keycloak
      port: 80
---
apiVersion: v1
kind: Secret
metadata:
  namespace: gateway-conformance-infra
  name: oidctest-foo-secret
data:
  client-secret: b2lkY3Rlc3QtZm9vLWNsaWVudC1zZWNyZXQ=   # base64 encoding of "oidctest-foo-client-secret"
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: oidc-test-foo
  namespace: gateway-conformance-infra
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: http-with-oidc-foo
  oidc:
    provider:
      issuer: "http://keycloak.gateway-conformance-infra/realms/master"
      authorizationEndpoint: "http://keycloak.gateway-conformance-infra/realms/master/protocol/openid-connect/auth"
      tokenEndpoint: "http://keycloak.gateway-conformance-infra/realms/master/protocol/openid-connect/token"
      endSessionEndpoint: "https://keycloak.gateway-conformance-infra/realms/master/protocol/openid-connect/logout"
    clientID: "oidctest-foo"
    clientSecret:
      name: "oidctest-foo-secret"
    redirectURL: "http://www.example.com/foo/oauth2/callback"
    logoutPath: "/foo/logout"
    forwardAccessToken: true
    passThroughAuthHeader: true
    forwardIDToken:
      header: "x-eg-id-token"
  jwt:
    providers:
    - name: "keycloak"  # This is needed so JWTs generated through the OIDC flow can be validated
      remoteJWKS:
        uri: "http://keycloak.gateway-conformance-infra/realms/master/protocol/openid-connect/certs"
        cacheDuration: 300s
    - name: "example"  # This allows us to use the static JWTs in the test
      remoteJWKS:
        uri: "http://static-file-server.gateway-conformance-infra/jwt/jwks.json"
        cacheDuration: 300s
---
apiVersion: v1
kind: Secret
metadata:
  namespace: gateway-conformance-infra
  name: oidctest-bar-secret
data:
  client-secret: b2lkY3Rlc3QtYmFyLWNsaWVudC1zZWNyZXQ=   # base64 encoding of "oidctest-bar-client-secret"
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: oidc-test-bar
  namespace: gateway-conformance-infra
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: http-with-oidc-bar
  oidc:
    provider:
      issuer: "http://keycloak.gateway-conformance-infra/realms/master"
      authorizationEndpoint: "http://keycloak.gateway-conformance-infra/realms/master/protocol/openid-connect/auth"
      tokenEndpoint: "http://keycloak.gateway-conformance-infra/realms/master/protocol/openid-connect/token"
      endSessionEndpoint: "https://keycloak.gateway-conformance-infra/realms/master/protocol/openid-connect/logout"
    clientID: "oidctest-bar"
    clientSecret:
      name: "oidctest-bar-secret"
    redirectURL: "http://www.example.com/bar/oauth2/callback"
    logoutPath: "/bar/logout"
    forwardIDToken:
      header: "Authorization"
