# Real IR extracted from gatewayapi's mergebackends-http-shared-cluster.out.yaml:
# two HTTPRoutes share one merged BackendCluster with a real multi-endpoint backend.
http:
- address: 0.0.0.0
  externalPort: 80
  hostnames:
  - '*'
  metadata:
    kind: Gateway
    name: gateway-1
    namespace: envoy-gateway
    sectionName: http
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      backendClusterRefs:
      - name: backend/service/default/service-1/8080/http
        weight: 1
      metadata:
        kind: HTTPRoute
        name: http-route-1
        namespace: default
      name: httproute/default/http-route-1/rule/0
    hostname: '*'
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: http-route-1
      namespace: default
    name: httproute/default/http-route-1/rule/0/match/0/*
    pathMatch:
      distinct: false
      name: ""
      prefix: /route-1
  - destination:
      backendClusterRefs:
      - name: backend/service/default/service-1/8080/http
        weight: 1
      metadata:
        kind: HTTPRoute
        name: http-route-2
        namespace: default
      name: httproute/default/http-route-2/rule/0
    hostname: '*'
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: http-route-2
      namespace: default
    name: httproute/default/http-route-2/rule/0/match/0/*
    pathMatch:
      distinct: false
      name: ""
      prefix: /route-2
backends:
- metadata:
    kind: HTTPRoute
    name: http-route-1
    namespace: default
  name: backend/service/default/service-1/8080/http
  setting:
    addressType: IP
    endpoints:
    - host: 7.7.7.8
      port: 8080
    - host: 7.7.7.9
      port: 8080
    - host: 7.7.7.7
      port: 8080
    metadata:
      kind: Service
      name: service-1
      namespace: default
      sectionName: "8080"
    name: backend/service/default/service-1/8080/http
    protocol: HTTP
    weight: 1
