clientTrafficPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: ClientTrafficPolicy
  metadata:
    name: ctp-ls-wide-conflict-with-gateway
    namespace: envoy-gateway
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners-a
    tcpKeepalive:
      probes: 5
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: ListenerSet
        name: ext-listeners-a
        namespace: envoy-gateway
      conditions:
      - lastTransitionTime: null
        message: ClientTrafficPolicy is being applied to multiple http (non https)
          listeners (envoy-gateway/composite-gateway/core-http, envoy-gateway/composite-gateway/envoy-gateway/ext-listeners-b/ext-http-b)
          on the same port, which is not allowed.
        reason: Invalid
        status: "False"
        type: Accepted
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: ClientTrafficPolicy
  metadata:
    name: ctp-ls-wide-conflict-with-other-ls
    namespace: envoy-gateway
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners-b
    tcpKeepalive:
      probes: 5
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: ListenerSet
        name: ext-listeners-b
        namespace: envoy-gateway
      conditions:
      - lastTransitionTime: null
        message: ClientTrafficPolicy is being applied to multiple http (non https)
          listeners (envoy-gateway/composite-gateway/core-http, envoy-gateway/composite-gateway/envoy-gateway/ext-listeners-a/ext-http-a)
          on the same port, which is not allowed.
        reason: Invalid
        status: "False"
        type: Accepted
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    name: composite-gateway
    namespace: envoy-gateway
  spec:
    allowedListeners:
      namespaces:
        from: Same
    gatewayClassName: envoy-gateway-class
    listeners:
    - allowedRoutes:
        namespaces:
          from: Same
      hostname: gw.example.com
      name: core-http
      port: 8081
      protocol: HTTP
  status:
    attachedListenerSets: 2
    listeners:
    - attachedRoutes: 0
      conditions:
      - lastTransitionTime: null
        message: Sending translated listener configuration to the data plane
        reason: Programmed
        status: "True"
        type: Programmed
      - lastTransitionTime: null
        message: Listener has been successfully translated
        reason: Accepted
        status: "True"
        type: Accepted
      - lastTransitionTime: null
        message: Listener references have been resolved
        reason: ResolvedRefs
        status: "True"
        type: ResolvedRefs
      name: core-http
      supportedKinds:
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
      - group: gateway.networking.k8s.io
        kind: GRPCRoute
