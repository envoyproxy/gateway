# Two routes force the weighted-clusters path and both reference the same merged cluster,
# but with different weights. The merged cluster's cached Settings[0].Weight (30, from
# whichever route registered it first) must not leak into the route that uses weight 90.
backends:
- metadata:
    kind: HTTPRoute
    name: http-route-a
    namespace: default
  name: backend/service/default/shared-service/8080/http
  setting:
    addressType: IP
    endpoints:
    - host: 7.7.7.7
      port: 8080
    metadata:
      kind: Service
      name: shared-service
      namespace: default
      sectionName: "8080"
    name: backend/service/default/shared-service/8080/http
    protocol: HTTP
    weight: 30
http:
- address: 0.0.0.0
  externalPort: 80
  hostnames:
  - '*'
  metadata:
    kind: Gateway
    name: gateway-1
    namespace: envoy-gateway
    sectionName: http
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      backendClusterRefs:
      - name: backend/service/default/shared-service/8080/http
        weight: 30
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.8
          port: 8080
        metadata:
          kind: Service
          name: other-service-a
          namespace: default
          sectionName: "8080"
        name: httproute/default/http-route-a/rule/0/backend/1
        protocol: HTTP
        weight: 70
      metadata:
        kind: HTTPRoute
        name: http-route-a
        namespace: default
      name: httproute/default/http-route-a/rule/0
    hostname: '*'
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: http-route-a
      namespace: default
    name: httproute/default/http-route-a/rule/0/match/0/*
    pathMatch:
      distinct: false
      name: ""
      prefix: /route-a
  - destination:
      backendClusterRefs:
      - name: backend/service/default/shared-service/8080/http
        weight: 90
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.9
          port: 8080
        metadata:
          kind: Service
          name: other-service-b
          namespace: default
          sectionName: "8080"
        name: httproute/default/http-route-b/rule/0/backend/1
        protocol: HTTP
        weight: 10
      metadata:
        kind: HTTPRoute
        name: http-route-b
        namespace: default
      name: httproute/default/http-route-b/rule/0
    hostname: '*'
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: http-route-b
      namespace: default
    name: httproute/default/http-route-b/rule/0/match/0/*
    pathMatch:
      distinct: false
      name: ""
      prefix: /route-b
