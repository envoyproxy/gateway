http:
- name: "first-listener"
  address: "::"
  path:
    mergeSlashes: true
    escapedSlashesAction: UnescapeAndRedirect
  port: 10080
  hostnames:
  - "*"
  routes:
  - name: "first-route"
    hostname: "*"
    traffic:
      healthCheck:
        active:
          timeout: "500ms"
          interval: "3s"
          unhealthyThreshold: 3
          healthyThreshold: 1
          http:
            host: "*"
            path: "/healthz"
            expectedResponse:
              text: "ok"
            expectedStatuses:
            - 200
            - 300
        passive:
          baseEjectionTime: 180s
          interval: 2s
          maxEjectionPercent: 100
          consecutive5XxErrors: 5
          consecutiveGatewayErrors: 0
          consecutiveLocalOriginFailures: 5
          splitExternalLocalOriginErrors: false
    destination:
      name: "first-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          port: 50000
        name: "first-route-dest/backend/0"
  - name: "second-route"
    hostname: "*"
    traffic:
      healthCheck:
        active:
          timeout: "1s"
          interval: "5s"
          unhealthyThreshold: 3
          healthyThreshold: 3
          http:
            host: "*"
            path: "/healthz"
            expectedResponse:
              binary: "cG9uZw=="
            expectedStatuses:
            - 200
            - 201
            retriableStatuses:
            - 503
            - 429
        passive:
          baseEjectionTime: 180s
          interval: 1s
          maxEjectionPercent: 100
          consecutive5XxErrors: 5
          consecutiveGatewayErrors: 0
          consecutiveLocalOriginFailures: 5
          splitExternalLocalOriginErrors: false
    destination:
      name: "second-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          hostname: example.com
          port: 50000
        name: "second-route-dest/backend/0"
  - name: "third-route"
    hostname: "*"
    traffic:
      healthCheck:
        active:
          timeout: "1s"
          interval: "5s"
          unhealthyThreshold: 3
          healthyThreshold: 3
          tcp:
            send:
              text: "ping"
            receive:
              text: "pong"
        passive:
          baseEjectionTime: 160s
          interval: 1s
          maxEjectionPercent: 100
          consecutive5XxErrors: 5
          consecutiveGatewayErrors: 0
          consecutiveLocalOriginFailures: 5
          splitExternalLocalOriginErrors: false
    destination:
      name: "third-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          port: 50000
        name: "third-route-dest/backend/0"
  - name: "fourth-route"
    hostname: "*"
    traffic:
      healthCheck:
        active:
          timeout: "1s"
          interval: "5s"
          unhealthyThreshold: 3
          healthyThreshold: 3
          tcp:
            send:
              binary: "cGluZw=="
            receive:
              binary: "cG9uZw=="
        passive:
          baseEjectionTime: 180s
          interval: 1s
          maxEjectionPercent: 90
          consecutive5XxErrors: 5
          consecutiveGatewayErrors: 0
          consecutiveLocalOriginFailures: 5
          splitExternalLocalOriginErrors: true
    destination:
      name: "fourth-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          port: 50000
        name: "fourth-route-dest/backend/0"
  - name: "fifth-route"
    hostname: "*"
    traffic:
      healthCheck:
        active:
          timeout: "1s"
          interval: "5s"
          unhealthyThreshold: 3
          healthyThreshold: 3
          grpc:
            service: my-service
    destination:
      name: "fifth-route-dest"
      settings:
      - endpoints:
        - host: "1.2.3.4"
          hostname: example.com
          port: 50000
        protocol: GRPC
        name: "fifth-route-dest/backend/0"
  - destination:
      metadata:
        kind: HTTPRoute
        name: httproute-6
        namespace: default
      name: httproute/default/httproute-6/rule/1
      settings:
      - addressType: FQDN
        endpoints:
        - host: example2.com
          hostname: example2.com
          port: 3001
        metadata:
          kind: Backend
          name: backend-2
          namespace: default
        name: httproute/default/httproute-6/rule/1/backend/0
        protocol: HTTP
        weight: 1
      - addressType: FQDN
        endpoints:
        - host: example3.com
          hostname: example3.com
          port: 3001
        metadata:
          kind: Backend
          name: backend-3
          namespace: default
        name: httproute/default/httproute-6/rule/1/backend/1
        protocol: HTTP
        weight: 1
    hostname: example.com
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: httproute-6
      namespace: default
      policies:
      - kind: BackendTrafficPolicy
        name: policy-for-route-6
        namespace: default
    name: httproute/default/httproute-6/rule/1/match/0/example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /v6-rewrite
    traffic:
      healthCheck:
        active:
          healthyThreshold: 2
          http:
            expectedStatuses:
            - 200
            host: example.com
            method: GET
            path: /healthz
          initialJitter: 15s
          interval: 30s
          timeout: 10s
          unhealthyThreshold: 2
    urlRewrite:
      host:
        name: example2.com
  - hostname: gateway.envoyproxy.io
    destination:
      metadata:
        kind: HTTPRoute
        name: httproute-6
        namespace: default
      name: httproute/default/httproute-6/rule/0
      settings:
      - addressType: FQDN
        endpoints:
        - host: example2.com
          hostname: example2.com
          port: 3001
        filters:
          urlRewrite:
            host:
              name: example2.com
        metadata:
          kind: Backend
          name: backend-2
          namespace: default
        name: httproute/default/httproute-6/rule/0/backend/0
        protocol: HTTP
        weight: 1
      - addressType: FQDN
        endpoints:
        - host: example3.com
          hostname: example3.com
          port: 3001
        metadata:
          kind: Backend
          name: backend-3
          namespace: default
        name: httproute/default/httproute-6/rule/0/backend/1
        protocol: HTTP
        weight: 1
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: httproute-6
      namespace: default
      policies:
      - kind: BackendTrafficPolicy
        name: policy-for-route-6
        namespace: default
    name: httproute/default/httproute-6/rule/0/match/0/gateway_envoyproxy_io
    pathMatch:
      distinct: false
      name: ""
      prefix: /v6
    traffic:
      healthCheck:
        active:
          healthyThreshold: 2
          http:
            expectedStatuses:
            - 200
            host: gateway.envoyproxy.io
            method: GET
            path: /healthz
          initialJitter: 15s
          interval: 30s
          timeout: 10s
          unhealthyThreshold: 2
          hostFrom: Endpoint
