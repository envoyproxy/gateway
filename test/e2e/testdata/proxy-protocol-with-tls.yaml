# This's used to test proxy protocol.
# Traffic from http 80 will be redirected to https://www.example.com:443 with proxy protocol enabled.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: proxy-protocol-gtw
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: http
      port: 80
      protocol: HTTP
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: example-com-tls
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: enable-proxy-protocol-policy
  namespace: gateway-conformance-infra
spec:
  enableProxyProtocol: true
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: proxy-protocol-gtw
      sectionName: https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - kind: Gateway
      name: proxy-protocol-gtw
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: www.example.com
      backendRefs:
        - group: "gateway.envoyproxy.io"
          kind: Backend
          name: proxy-protocol-backend
          port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: proxy-protocol
  namespace: gateway-conformance-infra
spec:
  hostnames:
    - www.example.com
  parentRefs:
    - kind: Gateway
      name: proxy-protocol-gtw
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: infra-backend-v1
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: enable-proxy-protocol
  namespace: gateway-conformance-infra
spec:
  proxyProtocol:
    version: V2
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: http
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: proxy-protocol-backend
  namespace: gateway-conformance-infra
spec:
  endpoints:
    - fqdn:
        # the service name of the gateway, this's not right on gateway namespace mode
        hostname: envoy-gateway-conformance-infra-proxy-protocol-gtw-4aabe705.envoy-gateway-system.svc
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: btls-proxy-protocol-backend
  namespace: gateway-conformance-infra
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: proxy-protocol-backend
  validation:
    caCertificateRefs:
      - name: example-ca
        group: ""
        kind: ConfigMap
    hostname: www.example.com
---
