---
# kubectl create secret generic client-example-com -n gateway-conformance-infra --from-file=ca.crt=example.com.crt --from-file=tls.crt=client.example.com.crt --from-file=tls.key=client.example.com.key --dry-run=client -o yaml > client-example-com.yaml

apiVersion: v1
data:
  ca.crt: 
  tls.crt: 
  tls.key: 
kind: Secret
metadata:
  creationTimestamp: null
  name: client-example-com
  namespace: gateway-conformance-infra
type: kubernetes.io/tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: client-mtls-clustertrustbundle
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: mtls
      port: 443
      protocol: HTTPS
      hostname: www.example.com
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: example-com-tls
        mode: Terminate
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: client-mtls-clustertrustbundle
  namespace: gateway-conformance-infra
spec:
  hostnames:
    - www.example.com
  parentRefs:
    - name: client-mtls-clustertrustbundle
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /cluster-trust-bundle
      backendRefs:
        - name: infra-backend-v1
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: ctp-client-mtls-clustertrustbundle
  namespace: gateway-conformance-infra
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: client-mtls-clustertrustbundle
    sectionName: mtls
  headers:
    xForwardedClientCert:
      certDetailsToAdd:
        - Subject
      mode: SanitizeSet
  tls:
    clientValidation:
      caCertificateRefs:
        - kind: ClusterTrustBundle
          group: ""
          name: example-com-tls
