apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-envoy-shutdown
  namespace: gateway-package-infra
spec:
  parentRefs:
  - name: package-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /envoy-shutdown
    backendRefs:
    - name: infra-backend
      port: 8080
