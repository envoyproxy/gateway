- address:
    socketAddress:
      address: 0.0.0.0
      portValue: 10080
  defaultFilterChain:
    filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        commonHttpProtocolOptions:
          headersWithUnderscoresAction: REJECT_REQUEST
        http2ProtocolOptions:
          initialConnectionWindowSize: 1048576
          initialStreamWindowSize: 65536
          maxConcurrentStreams: 100
        httpFilters:
        - disabled: true
          name: envoy.filters.http.dynamic_modules/envoyextensionpolicy/default/policy-for-http-route/dynamic-module/0
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
            dynamicModuleConfig:
              doNotClose: true
              loadGlobally: true
              module:
                local:
                  filename: /usr/lib/envoy/modules/ai_gateway.so
            filterConfig:
              '@type': type.googleapis.com/google.protobuf.StringValue
              value: '{"maxTokensPerMinute":10000}'
            filterName: token-ratelimit
        - disabled: true
          name: envoy.filters.http.dynamic_modules/envoyextensionpolicy/default/policy-path/dynamic-module/0
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
            dynamicModuleConfig:
              module:
                local:
                  filename: /opt/modules/my_module.so
            filterName: path-filter
        - disabled: true
          name: envoy.filters.http.dynamic_modules/envoyextensionpolicy/default/policy-terminal/dynamic-module/0
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
            dynamicModuleConfig:
              module:
                local:
                  filename: /usr/lib/envoy/modules/my_handler.so
            filterName: handler
            terminalFilter: true
        - disabled: true
          name: envoy.filters.http.dynamic_modules/envoyextensionpolicy/envoy-gateway/policy-for-gateway/dynamic-module/0
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
            dynamicModuleConfig:
              module:
                local:
                  filename: /usr/lib/envoy/modules/my_auth.so
            filterConfig:
              '@type': type.googleapis.com/google.protobuf.StringValue
              value: '{"authEndpoint":"https://auth.example.com"}'
            filterName: auth-check
        - disabled: true
          name: envoy.filters.http.dynamic_modules/envoyextensionpolicy/envoy-gateway/policy-for-gateway/dynamic-module/1
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
            dynamicModuleConfig:
              module:
                remote:
                  httpUri:
                    cluster: modules_example_com_443
                    timeout: 10s
                    uri: https://modules.example.com/libremote_auth.so
                  sha256: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
            filterConfig:
              '@type': type.googleapis.com/google.protobuf.StringValue
              value: '{"authEndpoint":"https://remote-auth.example.com"}'
            filterName: remote-auth-check
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            suppressEnvoyHeaders: true
        mergeSlashes: true
        normalizePath: true
        pathWithEscapedSlashesAction: UNESCAPE_AND_REDIRECT
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: envoy-gateway/gateway-1/http
        serverHeaderTransformation: PASS_THROUGH
        statPrefix: http-10080
        useRemoteAddress: true
    name: envoy-gateway/gateway-1/http
  maxConnectionsToAcceptPerSocketEvent: 1
  name: envoy-gateway/gateway-1/http
  perConnectionBufferLimitBytes: 32768
