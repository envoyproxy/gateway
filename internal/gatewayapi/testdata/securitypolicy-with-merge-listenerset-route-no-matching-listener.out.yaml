    name: policy-for-route
    namespace: default
  spec:
    cors:
      allowHeaders:
      - x-header-1
      allowMethods:
      - GET
      - POST
      allowOrigins:
      - https://www.example.com
    mergeType: StrategicMerge
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-1
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: gateway-1
        namespace: envoy-gateway
        sectionName: non-existent
      conditions:
      - lastTransitionTime: null
        message: No listeners in the ListenerSet match this parent ref
        reason: TargetNotFound
        status: "False"
        type: Accepted
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
