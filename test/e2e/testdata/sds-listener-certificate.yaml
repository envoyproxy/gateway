apiVersion: v1
kind: Secret
metadata:
  name: sds-listener-certificate-source
  namespace: gateway-conformance-infra
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: v1
kind: Secret
metadata:
  name: sds-listener-certificate-source
  namespace: envoy-gateway-system
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: v1
kind: Secret
metadata:
  name: sds-listener-certificate
  namespace: gateway-conformance-infra
type: gateway.envoyproxy.io/sds
stringData:
  url: /var/run/sds/server.sock
  secretName: sds-listener-certificate
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: sds-listener-certificate
  namespace: gateway-conformance-infra
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  volumes:
                    - name: sds-socket
                      emptyDir: {}
                    - name: sds-listener-certificate-source
                      secret:
                        secretName: sds-listener-certificate-source
                  containers:
                    - name: envoy
                      volumeMounts:
                        - name: sds-socket
                          mountPath: /var/run/sds
                    - name: sds-test-server
                      image: envoyproxy/gateway-sds-test-server:latest
                      imagePullPolicy: IfNotPresent
                      args:
                        - --socket-path=/var/run/sds/server.sock
                        - --secret-name=sds-listener-certificate
                        - --cert-path=/var/run/certificate/tls.crt
                        - --key-path=/var/run/certificate/tls.key
                      volumeMounts:
                        - name: sds-socket
                          mountPath: /var/run/sds
                        - name: sds-listener-certificate-source
                          mountPath: /var/run/certificate
                          readOnly: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sds-listener-certificate
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: sds-listener-certificate
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: sds.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: sds-listener-certificate
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sds-listener-certificate
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: sds-listener-certificate
      sectionName: https
  hostnames:
    - sds.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /sds-listener
      backendRefs:
        - name: infra-backend-v1
          port: 8080
