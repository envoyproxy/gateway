gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-1
  spec:
    hostnames:
    - gateway.envoyproxy.io
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: "/foo"
      backendRefs:
      - name: service-1
        port: 8080
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-2
  spec:
    hostnames:
    - gateway.envoyproxy.io
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: "/bar"
      backendRefs:
      - name: service-2
        port: 8080
extensionServerPolicies:
# A single policy targeting two HTTPRoutes that are both served by the same
# listener. Each route generated from either HTTPRoute receives the policy
# (delivered to the PostRouteModify hook).
- apiVersion: foo.example.io/v1alpha1
  kind: Bar
  metadata:
    name: policy-1
    namespace: default
  spec:
    targetRefs:
    - kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: httproute-1
    - kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: httproute-2
    data: "attached to two httproutes"
