      namespace: envoy-gateway
      name: gateway-1
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
    status:
      listeners:
        - attachedRoutes: 1
          conditions:
            - lastTransitionTime: null
              message: Sending translated listener configuration to the data plane
              reason: Programmed
              status: "True"
              type: Programmed
            - lastTransitionTime: null
