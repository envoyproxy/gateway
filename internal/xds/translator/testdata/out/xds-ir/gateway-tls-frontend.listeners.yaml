- address:
    socketAddress:
      address: 0.0.0.0
      portValue: 10443
  filterChains:
  - filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        commonHttpProtocolOptions:
          headersWithUnderscoresAction: REJECT_REQUEST
        http2ProtocolOptions:
          initialConnectionWindowSize: 1048576
          initialStreamWindowSize: 65536
          maxConcurrentStreams: 100
        httpFilters:
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            suppressEnvoyHeaders: true
        mergeSlashes: true
        normalizePath: true
        pathWithEscapedSlashesAction: UNESCAPE_AND_REDIRECT
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: envoy-gateway/client-validation-insecure-fallback/https
        serverHeaderTransformation: PASS_THROUGH
        statPrefix: https-10443
        useRemoteAddress: true
    name: envoy-gateway/client-validation-insecure-fallback/https
    transportSocket:
      name: envoy.transport_sockets.tls
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
        commonTlsContext:
          alpnProtocols:
          - h2
          - http/1.1
          combinedValidationContext:
            defaultValidationContext:
              trustChainVerification: ACCEPT_UNTRUSTED
            validationContextSdsSecretConfig:
              name: gateway/envoy-gateway/client-validation-insecure-fallback/default/ca.crt
              sdsConfig:
                ads: {}
                resourceApiVersion: V3
          tlsCertificateSdsSecretConfigs:
          - name: envoy-gateway/tls-validity-checks-certificate
            sdsConfig:
              ads: {}
              resourceApiVersion: V3
        disableStatefulSessionResumption: true
        disableStatelessSessionResumption: true
        requireClientCertificate: false
  maxConnectionsToAcceptPerSocketEvent: 1
  name: envoy-gateway/client-validation-insecure-fallback/https
  perConnectionBufferLimitBytes: 32768
- address:
    socketAddress:
      address: 0.0.0.0
      portValue: 8443
  filterChains:
  - filterChainMatch:
      serverNames:
      - second-example.org
    filters:
    - name: envoy.filters.network.http_connection_manager
