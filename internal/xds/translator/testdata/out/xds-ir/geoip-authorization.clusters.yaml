- circuitBreakers:
    thresholds:
    - maxRetries: 1024
  commonLbConfig: {}
  connectTimeout: 10s
  dnsLookupFamily: V4_PREFERRED
  edsClusterConfig:
    edsConfig:
      ads: {}
      resourceApiVersion: V3
    serviceName: httproute/default/httproute-plain/rule/0
  ignoreHealthOnHostRemoval: true
  lbPolicy: LEAST_REQUEST
  loadBalancingPolicy:
    policies:
    - typedExtensionConfig:
        name: envoy.load_balancing_policies.least_request
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.load_balancing_policies.least_request.v3.LeastRequest
          localityLbConfig:
            localityWeightedLbConfig: {}
  metadata:
    filterMetadata:
      envoy-gateway:
        resources:
        - kind: HTTPRoute
          name: httproute-plain
          namespace: default
  name: httproute/default/httproute-plain/rule/0
  perConnectionBufferLimitBytes: 32768
  type: EDS
  typedExtensionProtocolOptions:
    envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
      '@type': type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
      explicitHttpConfig:
        httpProtocolOptions: {}
      httpFilters:
      - name: envoy.filters.http.admission_control
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.http.admission_control.v3.AdmissionControl
          aggression:
            defaultValue: 1
          enabled:
            defaultValue: true
          maxRejectionProbability:
            defaultValue:
              value: 80
          rpsThreshold:
            defaultValue: 5
          samplingWindow: 30s
          srThreshold:
            defaultValue:
              value: 95
          successCriteria:
            httpCriteria:
              httpSuccessStatus:
              - end: 201
                start: 200
              - end: 202
                start: 201
              - end: 203
                start: 202
              - end: 205
                start: 204
      - name: envoy.extensions.filters.http.upstream_codec.v3.UpstreamCodec
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.http.upstream_codec.v3.UpstreamCodec
