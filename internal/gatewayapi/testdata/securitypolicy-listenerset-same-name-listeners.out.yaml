          protocol: HTTP
          servicePort: 80
      - name: envoy-gateway/composite-gateway/envoy-gateway/ext-listeners/shared
        ports:
        - containerPort: 8081
          name: http-8081
          protocol: HTTP
          servicePort: 8081
      - name: envoy-gateway/composite-gateway/envoy-gateway/other-listeners/shared
