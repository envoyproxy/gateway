http:
  - address: 0.0.0.0
    externalPort: 80
    hostnames:
      - "*"
    metadata:
      kind: Gateway
      name: gateway-1
      namespace: envoy-gateway
      sectionName: http
    name: envoy-gateway/gateway-1/http
    path:
      escapedSlashesAction: UnescapeAndRedirect
      mergeSlashes: true
    port: 10080
    routes:
      - destination:
          metadata:
            kind: HTTPRoute
            name: httproute-1
            namespace: default
          name: httproute/default/httproute-1/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              metadata:
                kind: Service
                name: service-1
                namespace: default
                sectionName: "8080"
              name: httproute/default/httproute-1/rule/0/backend/0
              protocol: HTTP
              tls:
                alpnProtocols:
                  - istio
                caCertificate:
                  fromSDS: true
                  name: ROOTCA
                clientCertificates:
                  - fromSDS: true
                    name: default
                sni: example.com
              weight: 1
        hostname: "*"
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-1
          namespace: default
        name: httproute/default/httproute-1/rule/0/match/0/*
        pathMatch:
          distinct: false
          exact: /exact
          name: ""
sds:
  destination:
    name: sds-grpc
    settings:
      - addressType: UDS
        endpoints:
          - host: ""
            path: /var/run/secrets/workload-spiffe-uds/socket
            port: 0
        metadata:
          kind: Backend
          name: spire-uds
          namespace: envoy-gateway-system
        name: sds-grpc/backend/-1
        protocol: GRPC
