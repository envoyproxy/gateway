gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: default
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-1
  spec:
    parentRefs:
    - namespace: default
      name: gateway-1
      sectionName: http
    hostnames:
    - foo.envoyproxy.io
    rules:
    - matches:
      - path:
          value: /
      backendRefs:
      - name: service-1
        port: 8080
services:
- apiVersion: v1
  kind: Service
  metadata:
    namespace: default
    name: service-1
  spec:
    ports:
    - port: 8080
      name: http
      protocol: TCP
      targetPort: 8080
endpointSlices:
- apiVersion: discovery.k8s.io/v1
  kind: EndpointSlice
  metadata:
    namespace: default
    name: service-1
    labels:
      kubernetes.io/service-name: service-1
  addressType: IPv4
  ports:
  - name: http
    port: 8080
    protocol: TCP
  endpoints:
  - addresses:
    - 7.7.7.7
    conditions:
      ready: true
backendTrafficPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: BackendTrafficPolicy
  metadata:
    namespace: default
    name: policy-btls
  spec:
    targetRef:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-1
    responseOverride:
    - match:
        statusCodes:
        - type: Value
          value: 500
        headers:
        - name: accept
          type: Contains
          value: application/json
      response:
        contentType: application/json
        body:
          type: Inline
          inline: '{"error": "server error"}'
    - match:
        statusCodes:
        - type: Value
          value: 500
      response:
        contentType: text/html
        body:
          type: Inline
          inline: '<html>500 error</html>'
