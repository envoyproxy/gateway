apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-backend-eg-upgrade
  namespace: gateway-package-infra
spec:
  parentRefs:
  - name: package-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /eg-upgrade
    backendRefs:
    - name: infra-backend
      port: 8080
