---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: sds-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "envoy-gateway"
  infrastructure:
    annotations:
      kubectl.kubernetes.io/default-container: envoy
      kubectl.kubernetes.io/default-logs-container: envoy
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: sds-gateway-settings
  listeners:
    - name: tcp
      protocol: TCP
      port: 8090
      allowedRoutes:
        kinds:
          - kind: TCPRoute
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: sds-gateway-settings
  namespace: gateway-conformance-infra
spec:
  ipFamily: IPv4
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        pod:
          volumes:
            - name: tls-certs
              secret:
                secretName: tls-termination-certificate
            - name: sds-socket
              hostPath:
                path: /var/run/sds
                type: DirectoryOrCreate
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                    - name: sds-server
                      image: envoyproxy/gateway-sds-server:latest
                      imagePullPolicy: IfNotPresent
                      args:
                        - "-socket=/var/run/sds/sds.sock"
                        - "-cert=/var/tls-certs/tls.crt"
                        - "-key=/var/tls-certs/tls.key"
                        - "-ca=/var/tls-certs/ca.crt"
                      volumeMounts:
                        - name: tls-certs
                          mountPath: /var/tls-certs/
                          readOnly: true
                        - name: sds-socket
                          mountPath: /var/run/sds
                    - name: envoy
                      volumeMounts:
                        # mount the SDS socket to the envoy container so that it can talk to the SDS server
                        - name: sds-socket
                          mountPath: "/var/run/sds"
  backendTLS:
    clientCertificateRef:
      kind: Secret
      name: "sds-client-tls-certificate"
---
apiVersion: v1
kind: Secret
metadata:
  name: sds-client-tls-certificate
  namespace: gateway-conformance-infra
type: gateway.envoyproxy.io/sds
data:
  # base64(/var/run/sds/sds.sock)
  url: L3Zhci9ydW4vc2RzL3Nkcy5zb2Nr
  # base64 for "server_cert"
  secretName: c2VydmVyX2NlcnQ=
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: sds-route
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: sds-gateway
  rules:
    - backendRefs:
        - name: sds-mtls-backend
          port: 443
