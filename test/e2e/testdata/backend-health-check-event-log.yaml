apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: hc-event-log-proxy
  namespace: gateway-conformance-infra
spec:
  ipFamily: IPv4
  telemetry:
    healthCheckLog: {}
  shutdown:
    drainTimeout: 5s
    minDrainDuration: 1s
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hc-event-log-gtw
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: hc-event-log-proxy
---
# Route without health checks — used to assert no HC events are logged before
# the HC-enabled route is applied.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-without-hc-event-log
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: hc-event-log-gtw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /no-hc-event-log
      backendRefs:
        - name: infra-backend-v1
          port: 8080
