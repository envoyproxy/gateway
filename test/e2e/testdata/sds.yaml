kind: ConfigMap
metadata:
  name: backend-tls-ca
  namespace: gateway-conformance-infra
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: tls-backend-policy
  namespace: gateway-conformance-infra
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: sds-mtls-backend
      sectionName: https
  validation:
    caCertificateRefs:
      - name: backend-tls-ca
        group: ""
        kind: ConfigMap
    hostname: example.com
---
# mTLS backend that validates client certificates
apiVersion: v1
kind: Service
metadata:
  name: sds-mtls-backend
  namespace: gateway-conformance-infra
spec:
  selector:
    app: sds-mtls-backend
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sds-mtls-backend
  namespace: gateway-conformance-infra
  labels:
    app: sds-mtls-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sds-mtls-backend
  template:
    metadata:
      labels:
        app: sds-mtls-backend
    spec:
      containers:
        - name: mtls-backend
          image: registry.k8s.io/gateway-api/echo-basic:v1.5.1
          volumeMounts:
            - name: server-cert-volume
              mountPath: /etc/server-cert
            - name: client-ca-volume
              mountPath: /etc/client-ca
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: sds-mtls-backend
            - name: TLS_SERVER_CERT
              value: /etc/server-cert/tls.crt
            - name: TLS_SERVER_PRIVKEY
              value: /etc/server-cert/tls.key
            - name: TLS_CLIENT_CACERTS
              value: /etc/client-ca/ca.crt
          resources:
            requests:
              cpu: 10m
      volumes:
        - name: server-cert-volume
          secret:
            secretName: backend-tls-checks-certificate
        - name: client-ca-volume
          secret:
            secretName: tls-termination-certificate
            items:
              - key: ca.crt
                path: ca.crt
---
