clientTrafficPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: ClientTrafficPolicy
  metadata:
    namespace: envoy-gateway
    name: ctp-gw
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: composite-gateway
      sectionName: shared
    tcpKeepalive:
      probes: 3
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: ClientTrafficPolicy
  metadata:
    namespace: envoy-gateway
    name: ctp-ls
  spec:
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ls-a
      sectionName: shared
    tcpKeepalive:
      probes: 5
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: composite-gateway
  spec:
    gatewayClassName: envoy-gateway-class
    allowedListeners:
      namespaces:
        from: Same
    listeners:
    - name: shared
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
listenerSets:
- apiVersion: gateway.networking.k8s.io/v1
  kind: ListenerSet
  metadata:
    namespace: envoy-gateway
    name: ls-a
  spec:
    parentRef:
      name: composite-gateway
    listeners:
    - name: shared
      protocol: HTTP
      port: 8081
      allowedRoutes:
        namespaces:
          from: Same
