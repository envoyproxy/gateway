gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      namespace: envoy-gateway
      name: gateway-1
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http-1
          protocol: HTTP
          port: 80
          hostname: foo.com
          allowedRoutes:
            namespaces:
              from: All
        - name: http-2
          protocol: HTTPS
          port: 80
          hostname: bar.com
          allowedRoutes:
            namespaces:
              from: All
        - allowedRoutes:
            namespaces:
              from: All
          name: udp-8162
          port: 8162
          protocol: UDP
        # This listener(http-8162) is valid because HTTP + UDP are compatible protocols.
        - allowedRoutes:
            namespaces:
              from: All
          name: http-8162
          port: 8162
          protocol: HTTP
        # This listener(tcp-8162) is invalid because TCP is not compatible with HTTP.
        - allowedRoutes:
            namespaces:
              from: All
          name: tcp-8162
          port: 8162
          protocol: TCP
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      namespace: default
      name: httproute-1
    spec:
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
      rules:
        - matches:
            - path:
                value: "/"
          backendRefs:
            - name: service-1
              port: 8080
