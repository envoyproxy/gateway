- clusterName: httproute/default/httproute-plain/rule/0
  endpoints:
  - lbEndpoints:
    - endpoint:
        address:
          socketAddress:
            address: 7.7.7.7
            portValue: 8080
      loadBalancingWeight: 1
    loadBalancingWeight: 1
    locality:
      region: httproute/default/httproute-plain/rule/0/backend/0
    metadata:
      filterMetadata:
        envoy-gateway:
          resources:
          - kind: Service
            name: service-1
            namespace: default
            sectionName: "8080"
