date: Pending

# Changes that are expected to cause an incompatibility with previous versions, such as deletions or modifications to existing APIs.
breaking changes: |

# Updates addressing vulnerabilities, security flaws, or compliance requirements.
security updates: |
  Fixed xDS server authentication bypass in GatewayNamespaceMode, adding Unary Interceptor and validating SotW requests.

# New features or capabilities added in this release.
new features: |

bug fixes: |
  Fixed the xDS server in GatewayNamespaceMode serving a stale certificate after cert-manager rotation by re-reading the cert from disk on every TLS handshake.
  Fixed controller panic when processing backend tls settings.

# Enhancements that improve performance.
performance improvements: |

# Deprecated features or APIs.
deprecations: |

# Other notable changes not covered by the above sections.
Other changes: |
  Moved the Gateway API safe-upgrades ValidatingAdmissionPolicy resources out
  of the CRD bundle and into the gateway-helm chart templates so tools such as
  Flux no longer treat them as CRDs. During upgrades, pre-existing unmanaged
  safe-upgrades ValidatingAdmissionPolicy resources are left unmanaged. No
  migration is required unless you want Helm to manage those resources; in that
  case, add Helm ownership metadata before upgrading. If Gateway API CRDs or
  policies are managed outside this chart, note that `--skip-crds` does not skip
  templated resources, so disable chart rendering with
  `crds.gatewayAPI.validatingAdmissionPolicy.enabled=false`.
