apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: ratelimit-except-all-ips
  namespace: gateway-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: cidr-invert-always-exempt
  rateLimit:
    type: Global
    global:
      rules:
        # Rate limit all IPs except 0.0.0.0/0 (all IPv4). So every client is "in" the exempt range and the rule never applies; we never see 429.
        - clientSelectors:
            - sourceCIDR:
                value: 0.0.0.0/0
                invert: true
          limit:
            requests: 2
            unit: Hour
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cidr-invert-always-exempt
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: same-namespace
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /never-limited
      backendRefs:
        - name: infra-backend-v1
          port: 8080
