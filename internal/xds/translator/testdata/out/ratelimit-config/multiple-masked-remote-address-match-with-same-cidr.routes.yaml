hasSharedRule: false
rateLimits:
- actions:
  - ActionSpecifier:
      GenericKey:
        descriptor_key: first-route
        descriptor_value: first-route
  - ActionSpecifier:
      RemoteAddressMatch:
        address_matcher:
          ranges:
          - address_prefix: 192.168.0.10
            prefix_len:
              value: 32
        descriptor_key: masked_remote_address
        descriptor_value: 192.168.0.10/32
routeName: first-route
---
hasSharedRule: false
rateLimits:
- actions:
  - ActionSpecifier:
      GenericKey:
        descriptor_key: second-route
        descriptor_value: second-route
  - ActionSpecifier:
      RemoteAddressMatch:
        address_matcher:
          ranges:
          - address_prefix: 192.168.0.10
            prefix_len:
              value: 32
        descriptor_key: masked_remote_address
        descriptor_value: 192.168.0.10/32
routeName: second-route
