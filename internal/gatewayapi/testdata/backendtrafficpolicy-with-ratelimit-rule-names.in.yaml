gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-1
  spec:
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-1
    rules:
    - matches:
      - path:
          value: "/"
      backendRefs:
      - name: service-1
        port: 8080
backendTrafficPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: BackendTrafficPolicy
  metadata:
    namespace: default
    name: policy-for-route
  spec:
    targetRef:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-1
    rateLimit:
      type: Global
      global:
        rules:
        - name: basic-limit
          clientSelectors:
          - headers:
            - name: x-user-id
              value: one
          limit:
            requests: 10
            unit: Minute
        - name: premium-limit
          clientSelectors:
          - headers:
            - name: x-user-id
              value: premium
          limit:
            requests: 100
            unit: Minute
        - clientSelectors:
          - sourceCIDR:
              type: "Distinct"
              value: 192.168.0.0/16
          limit:
            requests: 50
            unit: Hour
