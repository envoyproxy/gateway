globalResources:
  envoyClientCertificate:
    name: envoy-gateway-system/envoy
    privateKey: [107, 101, 121, 45, 100, 97, 116, 97]
    certificate: [99, 101, 114, 116, 45, 100, 97, 116, 97]
metrics:
  enablePerEndpointStats: true
http:
  - name: "first-listener"
    address: "::"
    port: 10080
    hostnames:
      - "*"
    path:
      mergeSlashes: true
      escapedSlashesAction: UnescapeAndRedirect
    routes:
      - name: "first-route"
        hostname: "*"
        traffic:
          rateLimit:
            global:
              rules:
                - name: "test-namespace/test-policy-1/rule/0"
                  headerMatches:
                    - name: "x-user-id"
                      exact: "one"
                  limit:
                    requests: 5
                    unit: second
                  shared: true
        pathMatch:
          exact: "foo/bar"
        destination:
          name: "first-route-dest"
          backendClusterRefs:
            - name: "first-route-dest"
      - name: "second-route"
        hostname: "*"
        traffic:
          rateLimit:
            global:
              rules:
                - name: "test-namespace/test-policy-1/rule/0"
                  headerMatches:
                    - name: "x-user-id"
                      exact: "one"
                  limit:
                    requests: 5
                    unit: second
                  shared: true
                - name: "test-namespace/test-policy-1/rule/1"
                  headerMatches:
                    - name: "x-org-id"
                      exact: "one"
                  limit:
                    requests: 5
                    unit: second
                  shared: true
        pathMatch:
          exact: "foo/baz"
        destination:
          name: "second-route-dest"
          backendClusterRefs:
            - name: "second-route-dest"
      - name: "third-route"
        hostname: "*"
        traffic:
          rateLimit:
            global:
              rules:
                - name: "test-namespace/test-policy-2/rule/0"
                  headerMatches:
                    - name: "x-user-id"
                      exact: "two"
                  limit:
                    requests: 10
                    unit: second
                  shared: true
                  requestCost:
                    number: 0
                  responseCost:
                    format: '%DYNAMIC_METADATA(my.cost.ns:request_cost)%'
        pathMatch:
          exact: "test"
        destination:
          name: "third-route-dest"
          backendClusterRefs:
            - name: "third-route-dest"
      - name: "fourth-route"
        hostname: "*"
        traffic:
          rateLimit:
            global:
              rules:
                - name: "test-namespace/test-policy-3/rule/0"
                  headerMatches:
                    - name: "x-user-id"
                      exact: "two"
                  limit:
                    requests: 10
                    unit: second
                  shared: false
        pathMatch:
          exact: "foo/bar"
        destination:
          name: "fourth-route-dest"
          backendClusterRefs:
            - name: "fourth-route-dest"
      - name: "fifth-route"
        hostname: "*"
        traffic:
          rateLimit:
            global:
              rules:
                - name: "test-namespace/test-policy-4/rule/0"
                  headerMatches:
                    - name: "x-user-id"
                      exact: "shared-with-cost"
                  limit:
                    requests: 5
                    unit: second
                  shared: true
                  requestCost:
                    number: 3
                - name: "test-namespace/test-policy-4/rule/1"
                  headerMatches:
                    - name: "x-user-id"
                      exact: "non-shared"
                  limit:
                    requests: 5
                    unit: second
                  shared: false
        pathMatch:
          exact: "fifth"
        destination:
          name: "fifth-route-dest"
          backendClusterRefs:
            - name: "fifth-route-dest"
backends:
  - name: "first-route-dest"
    settings:
      - endpoints:
          - host: "1.2.3.4"
            port: 50000
        name: "first-route-dest/backend/0"

  - name: "second-route-dest"
    settings:
      - endpoints:
          - host: "1.2.3.4"
            port: 50000
        name: "second-route-dest/backend/0"

  - name: "third-route-dest"
    settings:
      - endpoints:
          - host: "1.2.3.4"
            port: 50000
        name: "third-route-dest/backend/0"

  - name: "fourth-route-dest"
    settings:
      - endpoints:
          - host: "1.2.3.4"
            port: 50000
        name: "fourth-route-dest/backend/0"

      # fifth-route: mixed shared+non-shared rules with cost — verifies per-domain TypedPerFilterConfig split
  - name: "fifth-route-dest"
    settings:
      - endpoints:
          - host: "1.2.3.4"
            port: 50000
        name: "fifth-route-dest/backend/0"
