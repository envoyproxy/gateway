http:
- name: "first-listener"
  address: "::"
  port: 10080
  hostnames:
  - "*"
  path:
    mergeSlashes: true
    escapedSlashesAction: UnescapeAndRedirect
  routes:
  - name: "first-route"
    hostname: "*"
    traffic:
      timeout:
        http:
          requestTimeout: 5s
          maxStreamDuration: 30s
          streamIdleTimeout: 20s
    headerMatches:
    - name: user
      exact: "jason"
    destination:
      name: "first-route-dest"
      backendClusterRefs:
      - name: "first-route-dest"
  - name: "second-route"
    hostname: "*"
    traffic:
      timeout:
        http:
          requestTimeout: 4000s
          maxStreamDuration: 0s
    destination:
      name: "second-route-dest"
      backendClusterRefs:
      - name: "second-route-dest"
  - name: "third-route"
    hostname: "*"
    traffic:
      timeout:
        http:
          requestTimeout: 0s
    destination:
      name: "third-route-dest"
      backendClusterRefs:
      - name: "third-route-dest"
  - name: "forth-route"
    hostname: "*"
    timeout: 10s
    traffic:
      timeout:
        http:
          requestTimeout: 5s
    destination:
      name: "fourth-route-dest"
      backendClusterRefs:
      - name: "fourth-route-dest"
  - name: "fifth-route"
    hostname: "*"
    timeout: 10s
    destination:
      name: "fifth-route-dest"
      backendClusterRefs:
      - name: "fifth-route-dest"
  - name: "sixth-route"
    hostname: "*"
    timeout: 0s
    destination:
      name: "sixth-route-dest"
      backendClusterRefs:
      - name: "sixth-route-dest"
  - name: "seventh-route"
    hostname: "*"
    timeout: 0s
    traffic:
      timeout:
        http:
          requestTimeout: 5s
    destination:
      name: "seventh-route-dest"
      backendClusterRefs:
      - name: "seventh-route-dest"
- name: "second-listener"
  address: "::"
  port: 10081
  hostnames:
  - "*"
  path:
    mergeSlashes: true
    escapedSlashesAction: UnescapeAndRedirect
  timeout:
    http:
      streamIdleTimeout: 10s
  routes:
  - name: "first-route"
    hostname: "*"
    traffic:
      timeout:
        http:
          requestTimeout: 5s          # should not set route-level idle timeout because listener has it
    headerMatches:
    - name: user
      exact: "jason"
    destination:
      name: "first-route-dest"
      backendClusterRefs:
      - name: "first-route-dest"
backends:
- name: "first-route-dest"
  settings:
  - endpoints:
    - host: "1.2.3.4"
      port: 50000
    name: "first-route-dest/backend/0"
- name: "second-route-dest"
  settings:
  - endpoints:
    - host: "1.2.3.4"
      port: 50001
    name: "second-route-dest/backend/0"
