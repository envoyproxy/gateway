# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: docker
    directories:
      - /tools/docker/envoy-gateway/
      - /site
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directories:
      - /
      - /tools/github-actions/setup-deps
    schedule:
      interval: weekly
    ignore:
      # skip to update retest, because it won't work with the latest version
      - dependency-name: "envoyproxy/toolshed/gh-actions/retest"
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: gomod
    directories:
      - "/"
      - "examples/*"
    schedule:
      interval: weekly
    ignore:
      # Ignore cel-go, since it should be updated alongside k8s.io/apiserver
      - dependency-name: "github.com/google/cel-go"
      # Ignore github.com/google/go-containerregistry, since it should be updated alongside github.com/replicatedhq/troubleshoot
      - dependency-name: "github.com/google/go-containerregistry"
      # Ignore k8s.io/apimachinery, since it should be updated alongside k8s.io/api
      - dependency-name: "k8s.io/apimachinery"
    groups:
      gomod:
        patterns:
          - "github.com*"
          - "go.opentelemetry.io*"
          - "golang*"
          - "golang.org*"
          - "google*"
          - "google.golang.org*"
          - "fortio.org*"
          - "gopkg.in*"
          - "helm.sh*"
          - "gomodules.xyz*"
        exclude-patterns:
          # Exclude envoyproxy/go-control-plane, since it needs more work to update
          - "github.com/envoyproxy/go-control-plane*"
      k8s.io:
        patterns:
          - "k8s.io/*"
  - package-ecosystem: npm
    directories:
      - /site
      - /tools
    schedule:
      interval: weekly
    ignore:
      # fortawesome/fontawesome-free should be updated with docsy.
      - dependency-name: "@fortawesome/fontawesome-free"
  - package-ecosystem: pip
    directories:
      - /tools/src/codespell
      - /tools/src/yamllint
    schedule:
      interval: weekly
  - package-ecosystem: "helm"
    directories:
      - "/charts/gateway-addons-helm"
    schedule:
      interval: "weekly"
    groups:
      helm:
        patterns:
          - "*"
  # release/v1.8 branch updates — remove when release/v1.8 reaches EOL
  - package-ecosystem: docker
    target-branch: "release/v1.8"
    directories:
      - /tools/docker/envoy-gateway/
    schedule:
      interval: weekly
    commit-message:
      prefix: "[release-1.8]"
  - package-ecosystem: github-actions
    target-branch: "release/v1.8"
    directories:
      - /
      - /tools/github-actions/setup-deps
    schedule:
      interval: weekly
    commit-message:
      prefix: "[release-1.8]"
    ignore:
      - dependency-name: "envoyproxy/toolshed/gh-actions/retest"
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: gomod
    target-branch: "release/v1.8"
    directories:
      - "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "[release-1.8]"
    ignore:
      - dependency-name: "github.com/google/cel-go"
      - dependency-name: "github.com/google/go-containerregistry"
      - dependency-name: "github.com/envoyproxy/go-control-plane*"
      # Ignore all k8s.io packages on release branches to avoid unintended k8s version bumps
      - dependency-name: "k8s.io/*"
      # Ignore sigs.k8s.io/gateway-api on release branches to avoid unintended Gateway API version bumps
      - dependency-name: "sigs.k8s.io/gateway-api"
    groups:
      gomod:
        patterns:
          - "github.com*"
          - "go.opentelemetry.io*"
          - "golang*"
          - "golang.org*"
          - "google*"
          - "google.golang.org*"
          - "fortio.org*"
          - "gopkg.in*"
          - "helm.sh*"
          - "gomodules.xyz*"
  # release/v1.7 branch updates — remove when release/v1.7 reaches EOL
  - package-ecosystem: docker
    target-branch: "release/v1.7"
    directories:
      - /tools/docker/envoy-gateway/
    schedule:
      interval: weekly
    commit-message:
      prefix: "[release-1.7]"
  - package-ecosystem: github-actions
    target-branch: "release/v1.7"
    directories:
      - /
      - /tools/github-actions/setup-deps
    schedule:
      interval: weekly
    commit-message:
      prefix: "[release-1.7]"
    ignore:
      - dependency-name: "envoyproxy/toolshed/gh-actions/retest"
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: gomod
    target-branch: "release/v1.7"
    directories:
      - "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "[release-1.7]"
    ignore:
      - dependency-name: "github.com/google/cel-go"
      - dependency-name: "github.com/google/go-containerregistry"
      - dependency-name: "github.com/envoyproxy/go-control-plane*"
      # Ignore all k8s.io packages on release branches to avoid unintended k8s version bumps
      - dependency-name: "k8s.io/*"
      # Ignore sigs.k8s.io/gateway-api on release branches to avoid unintended Gateway API version bumps
      - dependency-name: "sigs.k8s.io/gateway-api"
    groups:
      gomod:
        patterns:
          - "github.com*"
          - "go.opentelemetry.io*"
          - "golang*"
          - "golang.org*"
          - "google*"
          - "google.golang.org*"
          - "fortio.org*"
          - "gopkg.in*"
          - "helm.sh*"
          - "gomodules.xyz*"
