envoyextensionpolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: envoy-gateway
    name: target-listenerset-section
  spec:
    lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:logInfo("listenerset-section")
        end
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners
      sectionName: ext-http
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: envoy-gateway
    name: target-listenerset-section-conflict
  spec:
    lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:logInfo("listenerset-section-conflict")
        end
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners
      sectionName: ext-http
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: envoy-gateway
    name: target-listenerset-invalid-section
  spec:
    lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:logInfo("listenerset-invalid-section")
        end
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners
      sectionName: missing-listener
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: envoy-gateway
    name: target-listenerset
  spec:
    lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:logInfo("listenerset")
        end
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyExtensionPolicy
  metadata:
    namespace: envoy-gateway
    name: target-listenerset-conflict
  spec:
    lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:logInfo("listenerset-conflict")
        end
    targetRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: ext-listeners
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: composite-gateway
  spec:
    gatewayClassName: envoy-gateway-class
    allowedListeners:
      namespaces:
        from: Same
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
listenerSets:
- apiVersion: gateway.networking.k8s.io/v1
  kind: ListenerSet
  metadata:
    namespace: envoy-gateway
    name: ext-listeners
  spec:
    parentRef:
      name: composite-gateway
    listeners:
    - name: ext-http
      protocol: HTTP
      port: 8081
      allowedRoutes:
        namespaces:
          from: Same
