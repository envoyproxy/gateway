# Real IR extracted from gatewayapi's mergebackends-http-gateway-traffic.out.yaml:
# two HTTPRoutes share one merged BackendCluster whose gateway-level
# BackendTrafficPolicy sets a circuitBreaker, which must land on the shared
# BackendCluster's Traffic field rather than on either route.
http:
- address: 0.0.0.0
  externalPort: 80
  hostnames:
  - '*'
  metadata:
    kind: Gateway
    name: gateway-1
    namespace: envoy-gateway
    sectionName: http
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      backendClusterRefs:
      - name: backend/service/default/service-1/8080/http
        weight: 1
      metadata:
        kind: HTTPRoute
        name: http-route-1
        namespace: default
        sectionName: rule-1
      name: httproute/default/http-route-1/rule/0
    hostname: '*'
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: http-route-1
      namespace: default
      sectionName: rule-1
    name: httproute/default/http-route-1/rule/0/match/0/*
    pathMatch:
      distinct: false
      name: ""
      prefix: /rule-1
  - destination:
      backendClusterRefs:
      - name: backend/service/default/service-1/8080/http
        weight: 1
      metadata:
        kind: HTTPRoute
        name: http-route-2
        namespace: default
        sectionName: rule-1
      name: httproute/default/http-route-2/rule/0
    hostname: '*'
    isHTTP2: false
    metadata:
      kind: HTTPRoute
      name: http-route-2
      namespace: default
      sectionName: rule-1
    name: httproute/default/http-route-2/rule/0/match/0/*
    pathMatch:
      distinct: false
      name: ""
      prefix: /rule-1
backends:
- metadata:
    kind: Service
    name: service-1
    namespace: default
    sectionName: "8080"
  name: backend/service/default/service-1/8080/http
  setting:
    addressType: IP
    endpoints:
    - host: 7.7.7.7
      port: 8080
    metadata:
      kind: Service
      name: service-1
      namespace: default
      sectionName: "8080"
    name: backend/service/default/service-1/8080/http
    protocol: HTTP
  traffic:
    circuitBreaker:
      maxConnections: 1024
