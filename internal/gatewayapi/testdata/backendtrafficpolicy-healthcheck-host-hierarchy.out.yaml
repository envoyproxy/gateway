infraIR:
  envoy-gateway/gateway:
    proxy:
      listeners:
      - name: envoy-gateway/gateway/http
        ports:
        - containerPort: 10080
          name: http-80
          protocol: HTTP
          servicePort: 80
      metadata:
        labels:
          gateway.envoyproxy.io/owning-gateway-name: gateway
          gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway
        ownerReference:
          kind: GatewayClass
          name: envoy-gateway-class
      name: envoy-gateway/gateway
      namespace: envoy-gateway-system
xdsIR:
  envoy-gateway/gateway:
    accessLog:
      json:
      - path: /dev/stdout
    globalResources:
      proxyServiceCluster:
        metadata:
          kind: Service
          name: envoy-envoy-gateway-gateway-966d2c13
          namespace: envoy-gateway-system
          sectionName: "8080"
        name: envoy-gateway/gateway
        settings:
        - addressType: IP
          endpoints:
          - host: 7.6.5.4
            port: 8080
            zone: zone1
          metadata:
            kind: Service
            name: envoy-envoy-gateway-gateway-966d2c13
            namespace: envoy-gateway-system
            sectionName: "8080"
          name: envoy-gateway/gateway
          protocol: TCP
    http:
    - address: 0.0.0.0
      externalPort: 80
      hostnames:
      - '*'
      metadata:
        kind: Gateway
        name: gateway
        namespace: envoy-gateway
        sectionName: http
      name: envoy-gateway/gateway/http
      path:
        escapedSlashesAction: UnescapeAndRedirect
        mergeSlashes: true
      port: 10080
      routes:
      - destination:
          metadata:
            kind: HTTPRoute
            name: httproute-backend-host
            namespace: default
          name: httproute/default/httproute-backend-host/rule/0
          settings:
          - addressType: FQDN
            endpoints:
