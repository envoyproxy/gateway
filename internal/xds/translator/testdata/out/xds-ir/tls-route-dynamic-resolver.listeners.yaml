- address:
    socketAddress:
      address: 0.0.0.0
      portValue: 10443
  filterChains:
  - filterChainMatch:
      serverNames:
      - foo.com
      - bar.com
    filters:
    - name: envoy.filters.network.rbac
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.rbac.v3.RBAC
        rules:
          action: DENY
          policies:
            deny-loopback-sni:
              permissions:
              - requestedServerName:
                  safeRegex:
                    regex: (?i)^(localhost|localhost\.localdomain|ip6-localhost|ip6-loopback|127\.0\.0\.1|::1|\[::1\])\.?$
              principals:
              - any: true
        statPrefix: tls-passthrough-10443
    - name: envoy.filters.network.sni_dynamic_forward_proxy
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.sni_dynamic_forward_proxy.v3.FilterConfig
        dnsCacheConfig:
          dnsLookupFamily: V4_PREFERRED
          dnsRefreshRate: 30s
          name: envoy-gateway-dfp-cache-v4_preferred-30000ms-default
        portValue: 443
    - name: envoy.filters.network.tcp_proxy
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
        cluster: tlsroute/default/tlsroute-1/rule/-1
        statPrefix: tls-passthrough-10443
    name: tlsroute/default/tlsroute-1
  listenerFilters:
  - name: envoy.filters.listener.tls_inspector
    typedConfig:
      '@type': type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
  maxConnectionsToAcceptPerSocketEvent: 1
  name: envoy-gateway/gateway-1/tls
  perConnectionBufferLimitBytes: 32768
