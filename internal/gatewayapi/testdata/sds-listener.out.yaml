infraIR:
  envoy-gateway/gateway-1:
    proxy:
      listeners:
      - name: envoy-gateway/gateway-1/sds-multiple
        ports:
        - containerPort: 10443
          name: https-443
          protocol: HTTPS
          servicePort: 443
      - name: envoy-gateway/gateway-1/sds-mixed
        ports:
        - containerPort: 8443
          name: https-8443
          protocol: HTTPS
          servicePort: 8443
      - name: envoy-gateway/gateway-1/sds-tls-terminate
        ports:
        - containerPort: 9443
          name: tls-9443
          protocol: TLS
          servicePort: 9443
      - name: envoy-gateway/gateway-1/sds-cross-namespace
        ports:
        - containerPort: 11443
          name: https-11443
          protocol: HTTPS
          servicePort: 11443
      metadata:
        labels:
          gateway.envoyproxy.io/owning-gateway-name: gateway-1
          gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway
        ownerReference:
          kind: GatewayClass
          name: envoy-gateway-class
      name: envoy-gateway/gateway-1
      namespace: envoy-gateway-system
tcpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: TCPRoute
  metadata:
    name: sds-tcproute
    namespace: default
  spec:
    parentRefs:
    - name: gateway-1
      namespace: envoy-gateway
      sectionName: sds-tls-terminate
    rules:
    - backendRefs:
      - name: service-1
        port: 8080
  status:
    parents:
    - conditions:
      - lastTransitionTime: null
        message: Route is accepted
        reason: Accepted
        status: "True"
        type: Accepted
      - lastTransitionTime: null
        message: Resolved all the Object references for the Route
        reason: ResolvedRefs
        status: "True"
        type: ResolvedRefs
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
      parentRef:
        name: gateway-1
        namespace: envoy-gateway
        sectionName: sds-tls-terminate
