http:
  - address: 0.0.0.0
    hostnames:
      - "*"
    metadata:
      kind: Gateway
      name: gateway-1
      namespace: default
      sectionName: http
    name: default/gateway-1/http
    path:
      escapedSlashesAction: UnescapeAndRedirect
      mergeSlashes: true
    port: 10080
    routes:
      - destination:
          name: httproute/default/httproute-local/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              protocol: HTTP
              weight: 1
              name: httproute/default/httproute-local/rule/0/backend/0
        hostname: "*"
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-local
          namespace: default
        name: httproute/default/httproute-local/rule/0/match/-1/*
        traffic:
          responseOverride:
            name: backendtrafficpolicy/default/policy-local
            rules:
              - match:
                  statusCodes:
                    - value: 401
                name: backendtrafficpolicy/default/policy-local/responseoverride/rule/0
                source: Local
                response:
                  body: eyJlcnJvciI6ICJVbmF1dGhvcml6ZWQifQ==
                  contentType: application/json
      - destination:
          name: httproute/default/httproute-backend/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              protocol: HTTP
              weight: 1
              name: httproute/default/httproute-backend/rule/0/backend/0
        hostname: "*"
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-backend
          namespace: default
        name: httproute/default/httproute-backend/rule/0/match/-1/*
        traffic:
          responseOverride:
            name: backendtrafficpolicy/default/policy-backend
            rules:
              - match:
                  statusCodes:
                    - value: 500
                name: backendtrafficpolicy/default/policy-backend/responseoverride/rule/0
                source: Backend
                response:
                  body: eyJlcnJvciI6ICJJbnRlcm5hbCBTZXJ2ZXIgRXJyb3IifQ==
                  contentType: application/json
      - destination:
          name: httproute/default/httproute-all/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              protocol: HTTP
              weight: 1
              name: httproute/default/httproute-all/rule/0/backend/0
        hostname: "*"
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-all
          namespace: default
        name: httproute/default/httproute-all/rule/0/match/-1/*
        traffic:
          responseOverride:
            name: backendtrafficpolicy/default/policy-all
            rules:
              - match:
                  statusCodes:
                    - value: 404
                name: backendtrafficpolicy/default/policy-all/responseoverride/rule/0
                source: All
                response:
                  body: Tm90IEZvdW5k
                  contentType: text/plain
