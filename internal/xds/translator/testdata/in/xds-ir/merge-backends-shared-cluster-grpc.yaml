# Real IR extracted from gatewayapi's mergebackends-grpc-shared-cluster.out.yaml:
# two GRPCRoutes share one merged BackendCluster with a real multi-endpoint backend.
http:
- address: 0.0.0.0
  externalPort: 80
  grpc:
    enableGRPCStats: true
    enableGRPCWeb: true
  hostnames:
  - '*'
  metadata:
    kind: Gateway
    name: gateway-1
    namespace: envoy-gateway
    sectionName: http
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      backendClusterRefs:
      - name: backend/service/default/service-1/8080/grpc
        weight: 1
      metadata:
        kind: GRPCRoute
        name: grpc-route-1
        namespace: default
      name: grpcroute/default/grpc-route-1/rule/0
    headerMatches:
    - distinct: false
      exact: foo
      name: magic
    hostname: '*'
    isHTTP2: true
    metadata:
      kind: GRPCRoute
      name: grpc-route-1
      namespace: default
    name: grpcroute/default/grpc-route-1/rule/0/match/0/*
  - destination:
      backendClusterRefs:
      - name: backend/service/default/service-1/8080/grpc
        weight: 1
      metadata:
        kind: GRPCRoute
        name: grpc-route-2
        namespace: default
      name: grpcroute/default/grpc-route-2/rule/0
    headerMatches:
    - distinct: false
      exact: bar
      name: magic
    hostname: '*'
    isHTTP2: true
    metadata:
      kind: GRPCRoute
      name: grpc-route-2
      namespace: default
    name: grpcroute/default/grpc-route-2/rule/0/match/0/*
backends:
- merged: true
  metadata:
    kind: GRPCRoute
    name: grpc-route-1
    namespace: default
  name: backend/service/default/service-1/8080/grpc
  settings:
  - addressType: IP
    endpoints:
    - host: 7.7.7.8
      port: 8080
    - host: 7.7.7.9
      port: 8080
    - host: 7.7.7.7
      port: 8080
    metadata:
      kind: Service
      name: service-1
      namespace: default
      sectionName: "8080"
    name: backend/service/default/service-1/8080/grpc
    protocol: GRPC
    weight: 1
