- circuitBreakers:
    thresholds:
    - maxRetries: 1024
  clusterType:
    name: envoy.clusters.dynamic_forward_proxy
    typedConfig:
      '@type': type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
      dnsCacheConfig:
        dnsLookupFamily: V4_PREFERRED
        dnsRefreshRate: 30s
        name: envoy-gateway-dfp-cache-v4_preferred-30000ms-default
  commonLbConfig: {}
  connectTimeout: 10s
  dnsLookupFamily: V4_PREFERRED
  ignoreHealthOnHostRemoval: true
  loadBalancingPolicy:
    policies:
    - typedExtensionConfig:
        name: envoy.load_balancing_policies.cluster_provided
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.load_balancing_policies.cluster_provided.v3.ClusterProvided
  name: tlsroute/default/tlsroute-1/rule/-1
  perConnectionBufferLimitBytes: 32768
