http:
- address: 0.0.0.0
  hostnames:
  - '*'
  name: envoy-gateway/gateway-1/https-mtls-allow-expired
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10443
  tls:
    certificates:
    - name: envoy-gateway/gateway-1/server-cert
      # byte slice representation of "cert-data"
      certificate: [99, 101, 114, 116, 45, 100, 97, 116, 97]
      # byte slice representation of "key-data"
      privateKey: [107, 101, 121, 45, 100, 97, 116, 97]
    caCertificate:
      name: envoy-gateway/gateway-1/ca-cert
      certificate: ""
    requireClientCertificate: true
    clientValidationEnabled: true
    allowExpiredCertificate: true
  routes:
  - destination:
      name: httproute/default/httproute-1/rule/0
      settings:
      - addressType: IP
        endpoints:
        - host: 7.7.7.7
          port: 8080
        protocol: HTTP
        weight: 1
        name: httproute/default/httproute-1/rule/0/backend/0
    hostname: gateway.envoyproxy.io
    name: httproute/default/httproute-1/rule/0/match/0/gateway_envoyproxy_io
    pathMatch:
      distinct: false
      name: ""
      prefix: /
    useClientProtocol: true
