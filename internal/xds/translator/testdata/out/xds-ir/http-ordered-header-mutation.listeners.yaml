- address:
    socketAddress:
      address: '::'
      portValue: 10080
  defaultFilterChain:
    filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        commonHttpProtocolOptions:
          headersWithUnderscoresAction: REJECT_REQUEST
        earlyHeaderMutationExtensions:
        - name: envoy.http.early_header_mutation.header_mutation
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.http.early_header_mutation.header_mutation.v3.HeaderMutation
            mutations:
            - append:
                appendAction: OVERWRITE_IF_EXISTS_OR_ADD
                header:
                  key: x-foo
                  value: "1"
            - append:
                header:
                  key: x-foo
                  value: "2"
            - remove: x-secret
            - removeOnMatch:
                keyMatcher:
                  safeRegex:
                    regex: ^x-internal-.*
            - append:
                appendAction: OVERWRITE_IF_EXISTS_OR_ADD
                header:
                  key: x-secret
                  value: regenerated
            - append:
                appendAction: ADD_IF_ABSENT
                header:
                  key: x-if-absent
                  value: default
            - append:
                appendAction: OVERWRITE_IF_EXISTS
                header:
                  key: x-if-exists
                  value: override
        http2ProtocolOptions:
          initialConnectionWindowSize: 1048576
          initialStreamWindowSize: 65536
          maxConcurrentStreams: 100
        httpFilters:
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            suppressEnvoyHeaders: true
        normalizePath: true
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: early-listener
        serverHeaderTransformation: PASS_THROUGH
        statPrefix: http-10080
        useRemoteAddress: true
    name: early-listener
  maxConnectionsToAcceptPerSocketEvent: 1
  name: early-listener
  perConnectionBufferLimitBytes: 32768
- address:
    socketAddress:
      address: '::'
      portValue: 10081
  defaultFilterChain:
    filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        commonHttpProtocolOptions:
          headersWithUnderscoresAction: REJECT_REQUEST
        http2ProtocolOptions:
          initialConnectionWindowSize: 1048576
          initialStreamWindowSize: 65536
          maxConcurrentStreams: 100
        httpFilters:
        - name: envoy.filters.http.header_mutation
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
            mutations:
              responseMutations:
              - append:
                  appendAction: OVERWRITE_IF_EXISTS_OR_ADD
                  header:
                    key: x-resp
                    value: a
              - append:
                  header:
                    key: x-resp
                    value: b
              - remove: server
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            suppressEnvoyHeaders: true
        normalizePath: true
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: late-listener
        serverHeaderTransformation: PASS_THROUGH
        statPrefix: http-10081
        useRemoteAddress: true
    name: late-listener
  maxConnectionsToAcceptPerSocketEvent: 1
  name: late-listener
  perConnectionBufferLimitBytes: 32768
