apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: ratelimit-except-cidr
  namespace: gateway-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: cidr-invert-ratelimit
  rateLimit:
    type: Global
    global:
      rules:
        # Rate limit all IPs except 192.0.2.0/24 (TEST-NET-1, RFC 5737; never used for real traffic, so test client is always subject to limit)
        - clientSelectors:
            - sourceCIDR:
                value: 192.0.2.0/24
                invert: true
          limit:
            requests: 2
            unit: Hour
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cidr-invert-ratelimit
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: same-namespace
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: infra-backend-v1
          port: 8080
