- address:
    socketAddress:
      address: '::'
      portValue: 10080
  defaultFilterChain:
    filters:
    - name: envoy.filters.network.http_connection_manager
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        commonHttpProtocolOptions:
          headersWithUnderscoresAction: REJECT_REQUEST
        http2ProtocolOptions:
          initialConnectionWindowSize: 1048576
          initialStreamWindowSize: 65536
          maxConcurrentStreams: 100
        httpFilters:
        - name: envoy.filters.http.jwt_authn
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
            providers:
              jwt/provider/example/7e0f64f43618ad77:
                audiences:
                - foo.com
                claimToHeaders:
                - claimName: claim.neteased.key
                  headerName: second-route-example-key1
                forward: true
                issuer: https://www.example.com
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: example
                remoteJwks:
                  asyncFetch: {}
                  cacheDuration: 300s
                  httpUri:
                    cluster: localhost_80
                    timeout: 10s
                    uri: http://localhost/jwt/public-key/jwks.json
              jwt/provider/example/c464f1a4e10c61a2:
                audiences:
                - foo.com
                claimToHeaders:
                - claimName: claim.neteased.key
                  headerName: one-route-example-key1
                forward: true
                issuer: https://www.example.com
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: example
                remoteJwks:
                  asyncFetch: {}
                  cacheDuration: 300s
                  httpUri:
                    cluster: localhost_80
                    timeout: 10s
                    uri: http://localhost/jwt/public-key/jwks.json
              jwt/provider/example2/9fb53f4aa4426db0:
                audiences:
                - one.foo.com
                - two.foo.com
                claimToHeaders:
                - claimName: claim.neteased.key
                  headerName: one-route-example2-key1
                - claimName: name
                  headerName: one-route-example2-key2
                clearRouteCache: true
                forward: true
                issuer: https://www.two.example.com
                localJwks:
                  inlineString: |
                    {
                      "keys": [
                        {
                          "kty": "oct",
                          "k": "1234567890"
                        }
                      ]
                    }
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: example2
              jwt/provider/example2/e2fe046d94962359:
                audiences:
                - one.foo.com
                - two.foo.com
                forward: true
                issuer: https://www.two.example.com
                normalizePayloadInMetadata:
                  spaceDelimitedClaims:
                  - scope
                  - scp
                payloadInMetadata: example2
                remoteJwks:
                  asyncFetch: {}
                  cacheDuration: 300s
                  httpUri:
                    cluster: "192_168_1_250_8080"
                    timeout: 10s
                    uri: https://192.168.1.250:8080/jwt/public-key/jwks.json
            requirementMap:
              jwt/requirement/7b9f7dfa2d18b3f1:
                requiresAny:
                  requirements:
                  - providerName: jwt/provider/example/c464f1a4e10c61a2
                  - providerName: jwt/provider/example2/9fb53f4aa4426db0
              jwt/requirement/333e4fca5cdf9227:
                requiresAny:
                  requirements:
                  - providerName: jwt/provider/example/7e0f64f43618ad77
                  - providerName: jwt/provider/example2/e2fe046d94962359
        - name: envoy.filters.http.router
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
            suppressEnvoyHeaders: true
        mergeSlashes: true
        normalizePath: true
        pathWithEscapedSlashesAction: UNESCAPE_AND_REDIRECT
        rds:
          configSource:
            ads: {}
            resourceApiVersion: V3
          routeConfigName: first-listener
        serverHeaderTransformation: PASS_THROUGH
        statPrefix: http-10080
        useRemoteAddress: true
    name: first-listener
  maxConnectionsToAcceptPerSocketEvent: 1
  name: first-listener
  perConnectionBufferLimitBytes: 32768
