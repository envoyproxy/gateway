apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internet-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: internet
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: private-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: private
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: v1
kind: Service
metadata:
  name: multiple-gc-backend
  namespace: gateway-conformance-infra
spec:
  selector:
    app: multiple-gc-backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multiple-gc-backend
  namespace: gateway-conformance-infra
  labels:
    app: multiple-gc-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multiple-gc-backend
  template:
    metadata:
      labels:
        app: multiple-gc-backend
    spec:
      containers:
      - name: multiple-gc-backend
        image: gcr.io/k8s-staging-ingressconformance/echoserver:v20221109-7ee2f3e
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 10m
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multiple-gc-route
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: internet-gateway
    sectionName: http
  - name: private-gateway
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /internet
    backendRefs:
    - name: multiple-gc-backend
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /private
    backendRefs:
    - name: multiple-gc-backend
      port: 8080
