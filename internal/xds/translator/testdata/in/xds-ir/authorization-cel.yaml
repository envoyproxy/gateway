http:
- address: 0.0.0.0
  hostnames:
  - '*'
  name: envoy-gateway/gateway-1/http
  path:
    escapedSlashesAction: UnescapeAndRedirect
    mergeSlashes: true
  port: 10080
  routes:
  - destination:
      name: httproute/default/httproute-1/rule/0
      backendClusterRefs:
      - name: httproute/default/httproute-1/rule/0
    hostname: www.example.com
    isHTTP2: false
    name: httproute/default/httproute-1/rule/0/match/0/www_example_com
    pathMatch:
      distinct: false
      name: ""
      prefix: /foo
    security:
      authorization:
        defaultAction: Deny
        rules:
        - action: Allow
          cel: request.path.startsWith('/admin')
          name: allow-admin-path
          principal: {}
        - action: Allow
          cel: request.method == 'POST'
          name: allow-team-post
          principal:
            headers:
            - name: x-team
              values:
              - team-a
backends:
- name: httproute/default/httproute-1/rule/0
  settings:
  - addressType: IP
    endpoints:
    - host: 7.7.7.7
      port: 8080
    name: httproute/default/httproute-1/rule/0/backend/0
    protocol: HTTP
    weight: 1
