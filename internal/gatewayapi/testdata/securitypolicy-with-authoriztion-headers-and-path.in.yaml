gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: envoy-gateway
    name: gateway-1
  spec:
    gatewayClassName: envoy-gateway-class
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: httproute-1
  spec:
    hostnames:
    - www.example.com
    parentRefs:
    - namespace: envoy-gateway
      name: gateway-1
      sectionName: http
    rules:
    - matches:
      - path:
          value: "/foo"
      backendRefs:
      - name: service-1
        port: 8080
securityPolicies:
- apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: SecurityPolicy
  metadata:
    namespace: envoy-gateway
    name: policy-for-gateway
  spec:
    targetRef:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-1
    authorization:
      defaultAction: Deny
      rules:
      - name: "allow-public-prefix"
        action: Allow
        operation:
          path:
            type: PathPrefix
            value: /public
        principal:
          headers:
          - name: x-user-id
            values:
            - john
            - alice
      - name: "allow-admin-exact"
        action: Allow
        operation:
          path:
            type: Exact
            value: /admin
            invert: true
        principal:
          headers:
          - name: x-role
            values:
            - admin
      - name: "deny-non-private"
        action: Deny
        operation:
          path:
            type: RegularExpression
            value: "^/private/.*"
        principal:
          headers:
          - name: x-team
            values:
            - red
