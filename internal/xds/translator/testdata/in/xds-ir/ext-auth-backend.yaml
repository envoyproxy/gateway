http:
  - address: 0.0.0.0
    hostnames:
      - '*'
    name: default/gateway-1/http
    path:
      escapedSlashesAction: UnescapeAndRedirect
      mergeSlashes: true
    port: 10080
    routes:
      - name: httproute/default/httproute-1/rule/0/match/0/www_foo_com
        hostname: www.foo.com
        isHTTP2: false
        pathMatch:
          distinct: false
          name: ""
          prefix: /foo1
        destination:
          name: httproute/default/httproute-1/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              protocol: HTTP
              weight: 1
              name: httproute/default/httproute-1/rule/0/backend/0
        security:
          extAuth:
            name: securitypolicy/default/policy-for-http-route-1
            failOpen: false
            grpc:
              authority: primary.foo.com
              destination:
                name: securitypolicy/default/policy-for-http-route-1/default/grpc-backend
                settings:
                  - addressType: FQDN
                    endpoints:
                      - host: primary.foo.com
                        port: 9000
                    protocol: GRPC
                    weight: 1
                    name: securitypolicy/default/policy-for-http-route-1/default/grpc-backend/backend/0
                    tls:
                      alpnProtocols: null
                      caCertificate:
                        certificate: 
                        name: backend-fqdn/default-ca
                      clientCertificates:
                      - certificate: 
                        name: default/authz-tls
                        privateKey: '[redacted]'
                      sni: primary.foo.com
            headersToExtAuth:
              - header1
              - header2
      - name: httproute/default/httproute-1/rule/1/match/0/www_foo_com
        hostname: www.foo.com
        isHTTP2: false
        pathMatch:
          distinct: false
          name: ""
          prefix: /foo2
        destination:
          name: httproute/default/httproute-1/rule/1
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              protocol: HTTP
              weight: 1
              name: httproute/default/httproute-1/rule/1/backend/0
        security:
          extAuth:
            name: securitypolicy/default/policy-for-http-route-1
            failOpen: false
            grpc:
              authority: primary.foo.com
              destination:
                name: securitypolicy/default/policy-for-http-route-1/default/grpc-backend
                settings:
                  - addressType: IP
                    endpoints:
                      - host: primary.foo.com
                        port: 3000
                    protocol: GRPC
                    weight: 1
                    name: securitypolicy/default/policy-for-http-route-1/default/grpc-backend/backend/0
            headersToExtAuth:
              - header1
              - header2
      - name: httproute/default/httproute-2/rule/0/match/0/www_bar_com
        hostname: www.bar.com
        isHTTP2: false
        pathMatch:
          distinct: false
          name: ""
          prefix: /bar

        destination:
          name: httproute/default/httproute-2/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 7.7.7.7
                  port: 8080
              protocol: HTTP
              weight: 1
              name: httproute/default/httproute-2/rule/0/backend/0
        security:
          extAuth:
            name: securitypolicy/default/policy-for-gateway-1
            failOpen: true
            traffic:
              circuitBreaker:
                maxConnections: 30001
                maxParallelRequests: 1022
                maxParallelRetries: 1023
                maxPendingRequests: 1024
            http:
              authority: primary.foo.com
              destination:
                name: securitypolicy/default/policy-for-gateway-1/envoy-gateway/http-backend
                settings:
                  - addressType: FQDN
                    endpoints:
                      - host: primary.foo.com
                        port: 80
                    protocol: HTTP
                    weight: 1
                    name: securitypolicy/default/policy-for-gateway-1/envoy-gateway/http-backend/backend/0
              headersToBackend:
                - header1
                - header2
              path: /auth
