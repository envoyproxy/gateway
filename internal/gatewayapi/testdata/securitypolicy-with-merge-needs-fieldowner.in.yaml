configmaps:
- apiVersion: v1
  kind: ConfigMap
  metadata:
    namespace: envoy-gateway
    name: context-extension-for-gateway
  data:
    data-shared: test-key-gateway
    data: test-key-gateway
- apiVersion: v1
  kind: ConfigMap
  metadata:
    namespace: default
    name: context-extension-for-route
  data:
    data-shared: test-key-route
    data: test-key-route
